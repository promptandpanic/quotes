name: Regenerate Static Fallback Images

on:
  workflow_dispatch:
    inputs:
      themes:
        description: "Comma-separated themes to regenerate (leave empty for all 7)"
        required: false
        default: ""

permissions:
  contents: write
  pull-requests: write

jobs:
  regenerate:
    name: Generate + open PR for review
    runs-on: ubuntu-latest
    timeout-minutes: 25

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Set up Python 3.11
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"
          cache: pip

      - name: Install dependencies
        run: pip install -r requirements.txt

      - name: Generate fallback images
        env:
          HF_API_KEY: ${{ secrets.HF_API_KEY }}
          HF_MODEL_ID: ${{ vars.HF_MODEL_ID || 'black-forest-labs/FLUX.1-schnell' }}
        run: |
          if [ -n "${{ inputs.themes }}" ]; then
            python scripts/gen_fallbacks.py --theme "${{ inputs.themes }}"
          else
            python scripts/gen_fallbacks.py
          fi

      - name: Check for changes
        id: diff
        run: |
          if git diff --quiet assets/static/; then
            echo "changed=false" >> "$GITHUB_OUTPUT"
            echo "No image changes — nothing to commit."
          else
            echo "changed=true" >> "$GITHUB_OUTPUT"
            git diff --stat assets/static/
          fi

      - name: Create branch, commit, open PR for review
        if: steps.diff.outputs.changed == 'true'
        id: pr
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          set -euo pipefail
          BRANCH="chore/regenerate-fallbacks-$(date +%Y%m%d-%H%M%S)"
          THEME_LABEL="${{ inputs.themes }}"
          THEME_LABEL="${THEME_LABEL:-all}"

          git config user.name  "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git checkout -b "$BRANCH"
          git add assets/static/
          git commit -m "chore: regenerate static fallback images ($THEME_LABEL)

          Auto-generated by regenerate_fallbacks.yml via FLUX.1-schnell.
          Trigger: manual (workflow_dispatch)."
          git push -u origin "$BRANCH"

          PR_URL=$(gh pr create \
            --title "chore: regenerate static fallback images ($THEME_LABEL)" \
            --body "Auto-generated by the regenerate_fallbacks workflow. Themes: \`$THEME_LABEL\`.

          Review the new images in \`assets/static/\` and merge when you're happy with them." \
            --base main \
            --head "$BRANCH")
          echo "Opened PR: $PR_URL"
          echo "pr_url=$PR_URL" >> "$GITHUB_OUTPUT"

      - name: Summary
        if: always()
        run: |
          if [ "${{ steps.diff.outputs.changed }}" = "true" ]; then
            echo "✅ PR opened for review: ${{ steps.pr.outputs.pr_url }}" >> "$GITHUB_STEP_SUMMARY"
            echo "" >> "$GITHUB_STEP_SUMMARY"
            echo "Review the generated images and merge the PR manually when satisfied." >> "$GITHUB_STEP_SUMMARY"
          else
            echo "ℹ️ No changes produced — FLUX returned bytes-identical outputs or the job failed before diffing." >> "$GITHUB_STEP_SUMMARY"
          fi
