name: Post Daily Quotes

on:
  schedule:
    - cron: "30 1 * * *"    # 01:30 UTC  →  Morning Motivation
    - cron: "30 5 * * *"    # 05:30 UTC  →  Wisdom & Philosophy
    - cron: "30 9 * * *"    # 09:30 UTC  →  Love & Relationships
    - cron: "30 12 * * *"   # 12:30 UTC  →  Mindfulness & Peace
    - cron: "30 16 * * *"   # 16:30 UTC  →  Goodnight Inspiration
    - cron: "30 19 * * *"   # 19:30 UTC  →  Late Night Feels

  # Manual trigger (for testing)
  workflow_dispatch:
    inputs:
      theme:
        description: "Theme to post (morning | wisdom | love | mindfulness | goodnight | latenight)"
        required: false
        default: "morning"

permissions:
  contents: write   # needed to update data/posted_quotes.json and upload release assets

jobs:
  post:
    name: Generate & Post Quote
    runs-on: ubuntu-latest
    timeout-minutes: 15
    env:
      FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: true

    steps:
      # ── 1. Checkout ──────────────────────────────────────────────────────
      - name: Checkout repository
        uses: actions/checkout@v4

      # ── 2. Python ────────────────────────────────────────────────────────
      - name: Set up Python 3.11
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"
          cache: pip

      # ── 3. Dependencies ──────────────────────────────────────────────────
      - name: Install dependencies
        run: pip install -r requirements.txt

      # ── 4. Install ffmpeg ────────────────────────────────────────────────
      - name: Install ffmpeg
        run: sudo apt-get install -y ffmpeg

      # ── 5. Determine theme ───────────────────────────────────────────────
      - name: Set THEME environment variable
        run: |
          if [ "${{ github.event_name }}" = "workflow_dispatch" ]; then
            echo "THEME=${{ github.event.inputs.theme }}" >> $GITHUB_ENV
          else
            case "${{ github.event.schedule }}" in
              "30 1 * * *")  echo "THEME=morning"      >> $GITHUB_ENV ;;
              "30 5 * * *")  echo "THEME=wisdom"       >> $GITHUB_ENV ;;
              "30 9 * * *")  echo "THEME=love"         >> $GITHUB_ENV ;;
              "30 12 * * *") echo "THEME=mindfulness"  >> $GITHUB_ENV ;;
              "30 16 * * *") echo "THEME=goodnight"    >> $GITHUB_ENV ;;
              "30 19 * * *") echo "THEME=latenight"    >> $GITHUB_ENV ;;
              *) echo "THEME=wisdom" >> $GITHUB_ENV ;;
            esac
          fi

      # ── 6. Run the bot ───────────────────────────────────────────────────
      - name: Run bot
        env:
          THEME: ${{ env.THEME }}
          GEMINI_API_KEY: ${{ secrets.GEMINI_API_KEY }}
          INSTAGRAM_ACCESS_TOKEN: ${{ secrets.INSTAGRAM_ACCESS_TOKEN }}
          INSTAGRAM_BUSINESS_ACCOUNT_ID: ${{ secrets.INSTAGRAM_BUSINESS_ACCOUNT_ID }}
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          GITHUB_REPOSITORY: ${{ github.repository }}
          SMTP_USERNAME: ${{ secrets.SMTP_USERNAME }}
          SMTP_PASSWORD: ${{ secrets.SMTP_PASSWORD }}
          NOTIFY_EMAILS: ${{ secrets.NOTIFY_EMAILS }}
        run: python main.py
