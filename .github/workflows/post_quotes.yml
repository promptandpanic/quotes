name: Post Daily Quotes

on:
  schedule:
    - cron: "0 7 * * *"
      timezone: "Asia/Kolkata"   # 07:00 AM IST  →  Morning Motivation
    - cron: "0 12 * * *"
      timezone: "Asia/Kolkata"   # 12:00 PM IST  →  Wisdom & Philosophy
    - cron: "0 15 * * *"
      timezone: "Asia/Kolkata"   # 03:00 PM IST  →  Love & Relationships
    - cron: "0 18 * * *"
      timezone: "Asia/Kolkata"   # 06:00 PM IST  →  Mindfulness & Peace
    - cron: "0 21 * * *"
      timezone: "Asia/Kolkata"   # 09:00 PM IST  →  Goodnight Inspiration
    - cron: "30 1 * * *"
      timezone: "Asia/Kolkata"   # 01:30 AM IST  →  Late Night Feels

  # Manual trigger (for testing)
  workflow_dispatch:
    inputs:
      theme:
        description: "Theme to post (morning | wisdom | love | mindfulness | goodnight | latenight)"
        required: false
        default: "morning"

permissions:
  contents: write   # needed to update data/posted_quotes.json and upload release assets

jobs:
  post:
    name: Generate & Post Quote
    runs-on: ubuntu-latest
    timeout-minutes: 15
    env:
      FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: true

    steps:
      # ── 1. Checkout ──────────────────────────────────────────────────────
      - name: Checkout repository
        uses: actions/checkout@v4

      # ── 2. Python ────────────────────────────────────────────────────────
      - name: Set up Python 3.11
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"
          cache: pip

      # ── 3. Dependencies ──────────────────────────────────────────────────
      - name: Install dependencies
        run: pip install -r requirements.txt

      # ── 4. Install ffmpeg ────────────────────────────────────────────────
      - name: Install ffmpeg
        run: sudo apt-get install -y ffmpeg

      # ── 5. Determine theme ───────────────────────────────────────────────
      # Read current IST hour directly — no UTC offset math needed.
      - name: Set THEME environment variable
        run: |
          if [ "${{ github.event_name }}" = "workflow_dispatch" ]; then
            echo "THEME=${{ github.event.inputs.theme }}" >> $GITHUB_ENV
          else
            HOUR=$(TZ="Asia/Kolkata" date +%H)
            HOUR_INT=$((10#$HOUR))
            if   [ "$HOUR_INT" -eq 7 ];  then echo "THEME=morning"      >> $GITHUB_ENV
            elif [ "$HOUR_INT" -eq 12 ]; then echo "THEME=wisdom"       >> $GITHUB_ENV
            elif [ "$HOUR_INT" -eq 15 ]; then echo "THEME=love"         >> $GITHUB_ENV
            elif [ "$HOUR_INT" -eq 18 ]; then echo "THEME=mindfulness"  >> $GITHUB_ENV
            elif [ "$HOUR_INT" -eq 21 ]; then echo "THEME=goodnight"    >> $GITHUB_ENV
            elif [ "$HOUR_INT" -eq 1 ];  then echo "THEME=latenight"    >> $GITHUB_ENV
            else
              echo "THEME=morning" >> $GITHUB_ENV
              echo "::warning::Unexpected IST hour $HOUR_INT — defaulting to morning"
            fi
          fi

      # ── 6. Run the bot ───────────────────────────────────────────────────
      - name: Run bot
        env:
          THEME: ${{ env.THEME }}
          GEMINI_API_KEY: ${{ secrets.GEMINI_API_KEY }}
          INSTAGRAM_ACCESS_TOKEN: ${{ secrets.INSTAGRAM_ACCESS_TOKEN }}
          INSTAGRAM_BUSINESS_ACCOUNT_ID: ${{ secrets.INSTAGRAM_BUSINESS_ACCOUNT_ID }}
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          GITHUB_REPOSITORY: ${{ github.repository }}
          SMTP_USERNAME: ${{ secrets.SMTP_USERNAME }}
          SMTP_PASSWORD: ${{ secrets.SMTP_PASSWORD }}
          NOTIFY_EMAILS: ${{ secrets.NOTIFY_EMAILS }}
        run: python main.py
