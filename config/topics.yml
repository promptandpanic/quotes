# Quote topic configuration for @_daily_dose_of_wisdom__
#
# Optimized for:
# - viral Instagram quote posts
# - Indian audience
# - English-only output
# - relatable, emotional, save-worthy content
#
# Writing intent:
# Topics should generate short, clean, emotionally direct quotes.
# Avoid sounding too abstract, preachy, or overly literary.
# Prefer themes people instantly relate to and share.
#
# Special keys:
#   topics        — used on most days
#   topic_groups  — weighted groups (latenight); weight = approximate % of posts

categories:

  morning:
    name: "Morning Motivation"
    max_words: 18

    topics:
      - "starting before you feel ready"
      - "showing up on low-energy days"
      - "small progress still matters"
      - "quiet discipline that builds your life"
      - "earning results instead of waiting"
      - "restarting after a difficult week"
      - "becoming stronger than your excuses"
      - "doing the work without applause"
      - "confidence built through action"
      - "choosing effort over regret"

    workout_topics:
      - "showing up when motivation is gone"
      - "fitness as self-respect"
      - "rest as part of progress"
      - "discipline through training"
      - "the effort nobody sees"
      - "consistency over intensity"

  wisdom:
    name: "Life Wisdom"
    max_words: 24

    topics:
      - "the gap between words and actions"
      - "truths understood too late"
      - "the cost of avoiding hard conversations"
      - "what pain teaches that comfort cannot"
      - "patterns we repeat without noticing"
      - "replaying the past until it hurts more"
      - "becoming someone you never planned to be"
      - "fear disguised as strength"
      - "clarity after disappointment"
      - "peace that begins with honesty"
      - "accepting what life has already shown you"
      - "learning the same lesson in different forms"

    cultural_topics:
      - tradition: "Indian wisdom"
        topics:
          - "doing your part without attachment to the result"
          - "duty, integrity, and inner peace"
          - "truths elders say that life later explains"
          - "karma as consequence"
          - "the self beyond status and noise"

      - tradition: "Japanese wisdom"
        topics:
          - "beauty in imperfection"
          - "purpose that gives life meaning"
          - "slow improvement over time"
          - "the wisdom of pause and silence"

      - tradition: "Chinese proverb"
        topics:
          - "patience and long-term thinking"
          - "balance in everyday life"
          - "restraint as wisdom"

      - tradition: "elder wisdom"
        topics:
          - "lessons only time teaches"
          - "what people wish they knew younger"
          - "regret as the price of delay"
          - "the quiet confidence of experience"

      - tradition: "nature wisdom"
        topics:
          - "patience learned from nature"
          - "growth that happens slowly"
          - "adapting without losing yourself"
          - "instinct over overthinking"

    # Featured authors — spotlight one per post, ~25% of wisdom runs
    # Picked for resonance with Indian Instagram audience aged 18-35
    featured_authors:
      - name: "Rumi"
        note: "13th-century Sufi poet — soul, longing, love, spiritual depth"
      - name: "Swami Vivekananda"
        note: "Indian monk — strength, fearlessness, duty, self-belief"
      - name: "Kabir Das"
        note: "15th-century Indian saint-poet — raw honest wisdom, non-attachment"
      - name: "APJ Abdul Kalam"
        note: "India's beloved president/scientist — dreams, youth, resilience"
      - name: "Khalil Gibran"
        note: "Lebanese poet (The Prophet) — love, pain, grief, beauty of life"
      - name: "Paulo Coelho"
        note: "Brazilian novelist (The Alchemist) — destiny, courage, following your heart"
      - name: "Chanakya"
        note: "Ancient Indian strategist — sharp life wisdom, power, self-discipline"
      - name: "Rabindranath Tagore"
        note: "Nobel laureate Indian poet — beauty, humanity, spiritual depth"
      - name: "Osho"
        note: "Indian mystic — awareness, ego, freedom, presence"

  love:
    name: "Love & Relationships"
    max_words: 24

    topics:
      - "choosing someone in ordinary moments"
      - "being fully known without performing"
      - "love shown through small actions"
      - "friendship becoming something deeper"
      - "staying gentle through change"
      - "relationships that survive hard seasons"
      - "love under family pressure"
      - "who you become in healthy love"
      - "feeling safe instead of confused"
      - "the difference between attention and care"
      - "being loved in ways that feel calm"
      - "outgrowing someone you once believed in"

    red_green_flag_topics:
      - "green flag: consistency without confusion"
      - "green flag: feeling safe to be yourself"
      - "green flag: respect during disagreement"
      - "green flag: remembering small things"
      - "green flag: peace instead of anxiety"
      - "red flag: they show up only when convenient"
      - "red flag: you feel smaller after loving them"
      - "red flag: apologising becomes your habit"
      - "red flag: affection depends on performance"
      - "red flag: they like your love more than your truth"
      - "the difference between being loved and being needed"
      - "anxious love is not deep love"

  mindfulness:
    name: "Mindfulness & Inner Peace"
    max_words: 20

    topics:
      - "permission to pause"
      - "rest without guilt"
      - "worrying about a future that has not happened"
      - "stillness in a noisy life"
      - "attention as your real currency"
      - "the body carrying hidden stress"
      - "worrying versus solving"
      - "you are tired, not lazy"
      - "slowing down before life forces you to"
      - "protecting your energy"
      - "making room for silence"
      - "returning to the present moment"

    spiritual_topics:
      - "verified quotes on presence and awareness"
      - "verified quotes on breath and peace"
      - "verified quotes on freedom from mental noise"
      - "verified quotes on self-inquiry"
      - "meditation as observation"
      - "the space between reaction and response"
      - "peace as daily practice"
      - "awareness before reaction"

  goodnight:
    name: "Goodnight & Gratitude"
    max_words: 22

    topics:
      - "letting the day end gently"
      - "gratitude for ordinary comfort"
      - "rest as self-respect"
      - "surviving a difficult day with grace"
      - "tomorrow as another chance"
      - "showing up quietly still matters"
      - "forgiving yourself for today"
      - "releasing what you could not control"
      - "sleeping without carrying everything forward"
      - "you did enough for one day"
      - "hope without pressure"
      - "small mercies that made the day easier"

  latenight:
    name: "Late Night Feels"
    max_words: 26

    topic_groups:
      - name: "relationships_loss"
        weight: 21
        topics:
          - "missing someone you should be over"
          - "loving who they were, not who they became"
          - "the silence after almost-love"
          - "saying you are fine when you are not"
          - "grief without closure"
          - "being left with memories but no answers"

      - name: "ambition_parental_pressure"
        weight: 25
        topics:
          - "the distance between who you are and who you promised to become"
          - "comparing your beginning to someone else's highlight reel"
          - "working hard without visible results"
          - "being the responsible one all the time"
          - "watching your parents age while you still feel unfinished"
          - "the version of you others believe in but you have not become yet"
          - "feeling behind while everyone else looks settled"

      - name: "identity_belonging"
        weight: 17
        topics:
          - "feeling like a stranger in your own life"
          - "being surrounded but not understood"
          - "performing a version of yourself to be accepted"
          - "belonging nowhere completely"
          - "not knowing which version of yourself is real"

      - name: "nostalgia_change"
        weight: 13
        topics:
          - "missing simpler versions of life"
          - "realising carefree days ended quietly"
          - "friendships that faded without a reason"
          - "old conversations that stayed in old phones"
          - "growing apart without meaning to"

      - name: "existential_overthinking"
        weight: 10
        topics:
          - "small worries becoming huge at night"
          - "wondering if you are building the right life"
          - "waiting so long that waiting became normal"
          - "questioning everything when the world goes quiet"

      - name: "emotional_reveal"
        weight: 9
        topics:
          - "when your silence starts sounding like self-protection"
          - "the distance arrived before the goodbye did"
          - "missing what you thought it was, not what it became"
          - "when being understanding becomes the loneliest role"
          - "the moment your effort turns into observation"
          - "being present in places you already outgrew"
          - "when your body notices the truth before your mind admits it"
          - "the kind of sadness that feels more like clarity"
          - "when warmth leaves a room before the person does"
          - "being understood only after you've gone quiet"

      - name: "microstory_quotes"
        weight: 5
        format_hint: "Write ONE sentence only — a tiny scene fragment, not a statement or a quote. Third-person or object point of view. It should read like a memory fragment someone recognises. No moralising, no insight, just the scene."
        topics:
          - "a small action that reveals something that was never said"
          - "an object or habit that carries the weight of someone leaving"
          - "the moment before or after something changed"
          - "a detail that stayed long after the person didn't"
          - "a routine disrupted by an absence"
          - "the gap between what someone did and what they meant"
          - "a gesture that was both tender and final"

  womenpower:
    name: "She Feels"
    max_words: 18
    format_hint: >
      Write a SHORT, raw, emotionally precise quote (max 18 words) that captures a
      specific feeling women instantly recognise. Not empowerment speeches. Not life
      lessons. A feeling — the kind girls screenshot and send to their best friend.
      First person or second person. Conversational, not poetic. No metaphors that
      require explanation. If it needs more than one read, it's too complicated.
    topics:
      # Raw relationship micro-feelings
      - "reading his message three times and choosing not to reply anyway"
      - "when his 'I've been busy' didn't match his Instagram story"
      - "loving someone who loves you back but slightly less"
      - "missing someone you promised yourself you were done missing"
      - "when you finally stop waiting for the apology that was never coming"
      - "wanting to be reached for once without having to ask first"
      - "when the person you needed to vent to was the actual problem"
      - "loving someone through their unavailability until you were empty"
      - "realizing you were waiting for something he already decided against"
      - "the specific ache of being almost chosen, repeatedly"
      - "when the effort gap becomes impossible to unsee"
      - "rereading old texts from people who used to feel like home"
      - "when you forgive someone privately and they never even know"
      - "the way it lands when someone you loved becomes a stranger with memories"
      # The "I'm fine" feeling
      - "saying you're fine and almost believing it this time"
      - "smiling through the part that actually hurt the most"
      - "laughing it off because explaining it was too exhausting"
      - "keeping it together all day and then unraveling alone in the car"
      - "crying in the shower because at least no one asks what's wrong there"
      - "replying 'haha' to avoid the conversation you actually need"
      - "holding it together in public and letting go in the parking lot"
      - "the way your voice sounds when you're trying not to cry on the phone"
      # 3am / overthinking spiral
      - "the thoughts that only arrive after midnight and don't leave until 4"
      - "the version of yourself that only comes out at 3am"
      - "when the overthinking starts and your brain won't let it go"
      - "lying awake replaying something that's definitely over"
      - "the spiral that starts with one small thought at bedtime"
      # Being the strong one / invisible labour
      - "being the one everyone calls but almost no one checks on"
      - "the exhaustion of always being the one who understands"
      - "loving people so hard you forget to save some for yourself"
      - "being strong for everyone except yourself"
      - "when a stranger's small kindness almost makes you cry because you needed it"
      - "carrying things for people who don't know how heavy it got"
      # Body / gut / intuition
      - "when your body already knew and you spent weeks catching up"
      - "the chest tightness that arrives before you can name what's wrong"
      - "your gut saying something your heart isn't ready to hear yet"
      - "when your stomach drops and you finally admit why"
      # Small joys and relief
      - "the specific relief when plans get cancelled and you didn't have to cancel them"
      - "doing something just for yourself without explaining why to anyone"
      - "the quiet joy of a day with no expectations on it"
      - "when someone finally says exactly what you needed to hear"
      - "the softness of a moment when everything felt okay for a minute"
      # Growing / changing / outgrowing
      - "growing out of something that used to feel like everything"
      - "when you choose yourself and still feel a little guilty about it"
      - "the soft panic when someone is unexpectedly kind to you"
      - "when you realize you've been shrinking to fit into their comfort"
      - "texting your best friend the thing you couldn't say out loud"
      - "the specific loneliness of being in the room but not really there"