# Visual style configuration for @_daily_dose_of_wisdom__
#
# Each style:
#   description — creative brief sent to Gemini; it writes the image_prompt
#   categories  — which posting slots this style appears in
#   weight      — high / medium / low (controls selection probability)
#
# Design philosophy:
#   Image = the scroll-stopping hook. Text appears after.
#   Every style must be instantly distinctive from typical AI quote imagery.
#   Avoid overly Indian imagery everywhere — cultural context only when quote calls for it.

styles:

  # ── HIGH VISUAL IMPACT — the scroll-stoppers ─────────────────────────────

  anthropomorphic_vintage:
    description: >
      Vintage illustrated animals living as humans — a fox in a burgundy tailored jacket reading a
      letter by candlelight, a rabbit at a cobalt-blue café table deep in thought, a bear writing
      by warm amber lamplight. Style: 1930s–50s children's book illustration for adults. CONTRAST
      IS KEY: vivid jewel-tone accent (cobalt, crimson, forest green) against warm parchment
      backgrounds — not muted, not washed-out. Aged paper texture, fine detailed linework, emotionally
      rich scenes. The bold saturated character against the warm paper background stops scrolling
      instantly — nobody else in the quote space does this.
    categories: [morning, wisdom, love, latenight]
    weight: high

  ghibli_anime:
    description: >
      2D hand-drawn animation frame inspired by classic Japanese animated cinema. VISUAL HOOK:
      extreme contrast between a tiny warm-lit figure and a vast, dramatically colored landscape —
      electric indigo sky meeting a glowing gold horizon, or a deep teal forest split by a single
      shaft of white light. Soft flat colors but with one punchy element that dominates: a moon so
      large it fills half the sky, cherry blossoms that are aggressively pink against a near-black
      background. 1990s anime aesthetic — painterly, perfectly composed, emotionally overwhelming.
      The contrast between intimate figure and epic scale is the scroll-stopper.
    categories: [morning, love, goodnight, mindfulness, wisdom]
    weight: high

  whimsical_sketch:
    description: >
      Hand-drawn pencil sketch on warm cream — loose expressive lines. MAXIMUM CONTRAST RULE: the
      selective color must be SHOCKING against the greyscale base. Think: flowers exploding in
      electric cobalt and acid yellow while everything else is graphite, a figure entirely grey
      except for one blood-red thread that snakes through the whole composition, leaves bursting in
      neon emerald and burnt orange. The color pop should feel almost violent against the grey —
      that extreme tonal jump is what freezes the thumb mid-scroll. Never fully colored, never
      fully grey. The single vivid element must be the first thing the eye sees.
    categories: [wisdom, love, goodnight, latenight, morning]
    weight: high

  silhouette_landscape:
    description: >
      A tiny sharp black silhouette against a landscape with HIGH CONTRAST sky — not just pastel,
      but dramatically graduated: deep electric orange at the horizon bleeding into violet and then
      near-black at the top, or a blindingly white moon against a midnight indigo sky. Perfect
      mirror reflection doubles the visual impact. The silhouette must be pure black, the sky must
      be vivid and saturated — the contrast between the two is the hook. Think: a single person
      standing on a ridge, the sky behind them split between fire-orange and electric blue like a
      split-toned photograph. Compositionally still, but visually electric.
    categories: [mindfulness, morning, wisdom, goodnight]
    weight: high

  nocturnal_aesthetic:
    description: >
      Atmospheric night scene with BOLD color contrast — not just moody dark, but jewel-toned dark.
      Deep midnight indigo sky against warm amber lantern glows that almost burn the eye. Cherry
      blossoms rendered in vivid hot pink against near-black branches. Aurora ribbons in electric
      cyan and violet slashing across the frame. The key is extreme warm-vs-cool contrast: deep cold
      backgrounds (midnight blue, dark plum) against blazing warm light sources (gold, amber, coral).
      Lo-fi anime background art energy — but with the saturation pushed further than feels safe.
      Makes late-night emotions feel electric and alive, not just soft and dreamy.
    categories: [latenight, goodnight, love, mindfulness]
    weight: high

  minimalist_line_art:
    description: >
      A single continuous flowing ink line on stark white — a face, two figures leaning close,
      hands clasped. One unbroken stroke implies the whole scene. CONTRAST RULE: the color accent
      must be pure and saturated against the white — not a pale wash but a single bold fill: a
      solid crimson heart shape, a flat cobalt blue tear, a pure gold sun. The white space is vast,
      the line is precise, the one color is a visual shout. Three elements in extreme contrast —
      white void, black line, one saturated pop. Feels like premium editorial design. The restraint
      itself is the scroll-stopper because every other quote image is busy.
    categories: [wisdom, love, mindfulness, latenight]
    weight: high

  metaphorical_digital:
    description: >
      Dark cinematic digital painting where the image IS the concept. CONTRAST HOOK: one blazing
      light source against near-total darkness — a single lit doorway in a pitch-black corridor
      that the viewer's eye cannot escape, a figure watering a plant while golden light pours only
      onto the plant in an otherwise charcoal-grey scene, broken glass reflecting stars against a
      black hand. The dark background should be very dark (near black), making the one lit element
      pop with almost physical force. Palette: deep charcoal and near-black base, then one
      electric accent — amber, rose gold, electric blue. Dramatic single-source lighting. The
      image should punch you before the words even register.
    categories: [latenight, wisdom, love]
    weight: high

  # ── WARM & PERSONAL ──────────────────────────────────────────────────────

  vector_girl:
    description: >
      Clean flat 2D vector illustration of a stylised girl figure — warm, expressive, graphic.
      CONTRAST RULE: bold complementary color pairing, not safe analogous tones. Think: electric
      teal outfit against a warm peach background, deep cobalt jacket against a vivid mustard
      backdrop, burgundy against sage. The character's silhouette must read instantly at thumbnail
      — bold outline, high contrast against background. Attire matches quote context: modern casual
      for everyday themes, traditional only when culturally resonant. 4-5 color palette, punchy
      and clean. Pose and expression carry the emotion — but the color contrast stops the scroll.
    categories: [love, goodnight]
    weight: high

  vector_couple:
    description: >
      Clean flat 2D vector — two illustrated figures in a composition with strong COLOR CONTRAST
      between the pair and their background. The figures should be rendered in warm tones (terracotta,
      blush, amber) against a cool high-contrast backdrop (deep teal, indigo, slate), or vice versa.
      Body language conveys the quote's emotion — leaning in, a meaningful glance, hands almost
      touching. The contrast between the warm figures and cool environment (or cool night sky and
      warm figures in the foreground) creates visual depth without complexity. One frame, one story,
      instantly legible at thumbnail size.
    categories: [love, goodnight]
    weight: high

  watercolour_ink:
    description: >
      Hand-painted watercolour on cold-press paper texture — delicate bleeds, ink line details,
      deeply organic. CONTRAST HOOK: one vivid color bleeds dramatically against a near-white
      background or complementary wash — deep indigo hands against a warm rose blush wash, a single
      crimson candle flame against cool grey-blue darkness, rain rendered in electric cobalt on ivory
      paper. The watercolour bloom should look almost accidental in its beauty. Palette is otherwise
      restrained — blush, ivory, sage — so the ONE saturated element hits like a signal flare.
      Feels genuinely handmade, which is the hook in a feed of clean AI imagery.
    categories: [love, mindfulness, goodnight, wisdom]
    weight: high

  cozy_aesthetic:
    description: >
      A perfectly composed scene with EXTREME FOREGROUND CONTRAST — one sharp, vivid element in
      the foreground (a steaming cup with clearly visible wisps of steam, a candle flame that is
      actually bright, an open journal with visible ink) against everything behind it dissolved to
      near-abstract warm bokeh. The foreground element should be nearly hyper-real in its clarity,
      the background should be nearly formless warmth. Amber-gold and honey tones — but the bokeh
      balls of fairy lights should be bright white-gold, not just yellow, popping against the warm
      blur. Compositionally tight, not a wide room shot. The sharpness-vs-blur contrast creates
      magnetic depth.
    categories: [goodnight, latenight, love, mindfulness]
    weight: high

  # ── CLEAN & BOLD ─────────────────────────────────────────────────────────

  minimalist_vector:
    description: >
      Bold flat 2D poster illustration — no human figures, clean geometric symbolic imagery:
      a compass, a lone doorway, a lighthouse beam, a path splitting in two. CONTRAST IS THE STYLE:
      maximum 3 colors, and they must be high-contrast — deep navy against electric yellow, pure
      black against vivid coral, forest green against bright cream. The image should look like a
      premium risograph poster: flat, bold, graphically powerful. No gradients. No textures. Just
      shape, silhouette, and brutal color contrast. Reads in under one second at thumbnail size —
      that speed of comprehension is the scroll-stopper.
    categories: [morning, wisdom, mindfulness]
    weight: medium

  minimalist_nature:
    description: >
      One powerful natural element in extreme negative space — a single bare branch with one blossom,
      a rain-caught spider web at dawn, a lone tree on a ridge at dusk. CONTRAST RULE: the subject
      must be darker than feels comfortable against the background, or lighter than feels possible.
      A near-black branch against blinding white sky, a pale silver crescent moon against a deep
      charcoal-black background with zero graduation. No soft middle tones — pure dark subject,
      pure light background or vice versa. The image holds its breath. The extreme tonal contrast
      creates tension that quiet quotes need to land.
    categories: [mindfulness, wisdom, goodnight, latenight]
    weight: medium

  wholesome_doodle:
    description: >
      Simple charming doodle — figures with just enough detail to read emotion: a hug, two people
      sharing an umbrella, someone journaling at a window. CONTRAST RULE: thick bold black outlines
      on pure white background, with flat color fills that are VIVID and complementary — not pastel,
      but the actual bold version of those colors. Cobalt blue and warm coral, forest green and
      golden yellow, deep purple and peach. Feels like a premium webcomic panel, not a child's
      coloring book. The bold line + vivid flat fill + white background creates maximum graphic
      clarity — instantly readable and shareable at any size.
    categories: [morning, love, latenight]
    weight: medium

  risograph_print:
    description: >
      Duotone risograph print effect — the entire image in just two overlapping ink colours with
      visible halftone grain and slight misregistration. CONTRAST RULE: the two ink colours must
      be high-contrast complementaries, not harmonious — indigo + acid yellow, deep teal + vivid
      coral, near-black navy + bright warm cream. The halftone grain should be visible and coarse,
      the misregistration deliberate and slightly vertiginous. Subject can be a figure, landscape,
      or abstract form — the printing aesthetic IS the differentiator. In a feed of smooth clean AI
      imagery, the visible grain and bold color contrast look hand-printed and completely unique.
    categories: [wisdom, latenight, mindfulness]
    weight: medium

  # ── ACCENT — used sparingly for high impact ──────────────────────────────

  double_exposure:
    description: >
      Silhouette of a person (or hands, or a figure from behind) filled with layered landscape
      texture — a dense forest growing inside a face, a starry sky inside a silhouette, clouds
      through outstretched hands. CONTRAST HOOK: the silhouette boundary must be crisp and
      high-contrast against the background — the edge where the person ends and the world begins
      should be sharp. Inside the silhouette: rich, detailed texture. Outside: a dramatically
      different single tone (near-white, deep charcoal, or a solid bold color). The contrast
      between the intricate interior and the stark exterior is what makes this work. Used sparingly —
      only for quotes with genuine metaphorical depth.
    categories: [latenight, love, wisdom]
    weight: low

  dark_surreal:
    description: >
      Impossible dream-logic scene — a figure walking on a ceiling, a door standing alone in open
      ocean, a city built upside-down. CONTRAST RULE: the impossible element must be rendered with
      photorealistic detail while the surrounding scene is dark and atmospheric — the contrast
      between the hyper-real surreal object and the dark dreamlike setting creates the vertigo.
      Deep dark backgrounds (near-black, deep charcoal) with one element that is almost too
      detailed, too real, too brightly lit to belong. Used rarely — best for late-night existential
      content where the image should feel as unmoored and vivid as the thought itself.
    categories: [latenight, wisdom]
    weight: low
