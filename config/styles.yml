  minimalist_nature:
    description: >
      A premium minimalist nature composition built around one single natural element suspended in vast,
      intentional negative space. The image should feel still, elegant, and emotionally arresting —
      like a visual breath held for a second too long. It should stop the scroll not through spectacle,
      but through silence, clarity, and the strange power of one isolated form.
  
      Choose one natural subject that matches the quote’s emotional mood, such as:
      a single bare branch with one blossom,
      a rain-caught spider web at dawn,
      a crescent moon over dark water,
      a lone tree on a ridge at dusk,
      a single falling leaf,
      a stone in faint rippling water,
      one bird on a wire,
      a fern slowly uncurling,
      a reed in still water,
      a single blade of grass holding one drop,
      a drifting feather,
      one shell on empty sand,
      a small wave line beneath a vast sky,
      one petal resting on still water,
      or a single star-like point above a dark horizon.
      The subject must feel singular, delicate, unmistakable, and chosen on purpose.
  
      The emotional hook is tension through absence.
      Most of the frame should remain empty, open, and visually quiet.
      The image should feel like it is holding its breath.
      The emptiness must feel meaningful — not blank, not unfinished, not accidental.
      It should create introspection, spaciousness, and emotional projection.
  
      Use extreme tonal contrast as the main visual language.
      Build the image as either:
      a near-black subject against a near-white, misty, pale, or softly luminous background,
      or a near-white subject against a deep charcoal, black-blue, or almost-black field.
      Avoid muddy midtones, weak contrast, soft greys-on-greys, or overly atmospheric blur.
      The subject must separate cleanly from the background in under one second.
      This stark visual separation is the core scroll-stopping device.
  
      Make the subject small and beautifully placed.
      Use asymmetry intentionally:
      upper third,
      far edge,
      low horizon,
      top corner,
      or a quiet off-center placement that leaves abundant breathing room.
      The subject should never dominate the frame.
      Its smallness should amplify solitude, fragility, stillness, wonder, or quiet ache.
  
      Shape matters more than detail.
      Prioritize elegant silhouette and pure form:
      the curve of a branch,
      the geometry of a web,
      the arc of a moon,
      the tilt of a bird,
      the vertical tension of a reed,
      the suspended drift of a leaf,
      or the circle-and-ripple relationship of a stone in water.
      In this style, shape is what carries the emotion.
  
      If environmental detail is present, it must be minimal and nearly invisible:
      one faint horizon line,
      a soft fog gradient,
      a subtle reflection,
      a delicate ripple,
      a whisper of rain,
      a barely-there cloud fade,
      or one smooth shadow.
      These details should deepen the stillness, never interrupt it.
  
      Composition must strongly preserve quote space.
      Use the empty field itself as a design asset:
      sky, fog, water, paper-white atmosphere, pale dawn haze, or deep empty night.
      The lower two-thirds or a broad central area should remain calm, smooth, and low-detail
      so the quote can sit naturally without crowding the subject.
      The quote space should feel luxurious, meditative, and effortless.
  
      The overall feeling should be poetic, contemplative, restrained, and unforgettable.
      It should feel like a premium editorial art print or gallery poster for introspective writing —
      something quiet enough to calm the viewer, but strong enough to make them stop.
  
      NO busy landscapes, NO multiple natural subjects, NO decorative color palettes,
      NO textured forests, NO dramatic sunsets, NO clutter, NO heavy detail, NO visual noise,
      NO obvious symbolism beyond the single natural element, NO low-contrast softness that weakens the form.
  
      The final image should feel like silence made visible:
      one natural shape, one field of emptiness, one moment of contrast,
      and enough stillness for the quote to land with real emotional force.
    categories: [mindfulness, wisdom, goodnight, latenight]
    weight: medium

  wholesome_doodle:
    description: >
      A simple, charming, emotionally expressive doodle illustration designed to feel instantly lovable,
