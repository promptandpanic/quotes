  watercolour_ink:
    description: >
      A hand-painted watercolor-and-ink illustration on textured cold-press paper, designed to feel
      intimate, tactile, and emotionally arresting at first glance. The image should look genuinely handmade —
      soft pigment blooms, delicate ink details, organic edges, subtle paper grain, and the kind of visual
      imperfection that makes it feel personal and save-worthy.

      Choose a subject that matches the quote’s emotional tone, such as:
      two hands almost touching,
      a single candle flame against dark,
      rain on a window pane,
      a face in profile looking away,
      a flower opening,
      a bird mid-flight,
      a figure standing in a doorway,
      a teacup with rising steam,
      a letter half-written,
      a tree reflected in still water,
      a woman holding a folded note,
      a moon behind thin clouds,
      or a pair of shoes left by a threshold.
