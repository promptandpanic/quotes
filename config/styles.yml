      The moment should feel clear, sweet, and emotionally legible at a glance.

      Style should be playful but clean:
      thick bold black outlines,
      simplified shapes,
      rounded forms,
      flat color fills,
      expressive pose language,
      and minimal but meaningful detail.
      It should feel hand-drawn in spirit, but graphically polished enough to read clearly at any size.
      Think warmth, sincerity, and visual friendliness — not messy sketchbook chaos.

      The main hook must come from bold black linework on a pure white background,
      combined with vivid complementary or high-contrast flat color pairs.
      Use strong combinations such as:
      cobalt blue and warm coral,
      forest green and golden yellow,
      deep purple and peach,
      teal and tangerine,
      berry red and pale mint,
      or navy and butter yellow.
      Keep the palette bright, clean, and emotionally uplifting.
      The black outline should create instant structure,
      while the color pair should create immediate stop-power.

      Use only a small controlled palette:
      black outlines,
      white background,
      and 2 to 3 vivid flat fill colors maximum.
      Avoid muddy shades, gradients, textures, and too many competing hues.
      The simplicity is what makes the illustration punchy and memorable.

      Make the emotional action the focal point:
      the umbrella covering both figures,
      the pinky promise,
      the tiny gap between two people,
      a balloon drifting upward,
      a shared blanket,
      a notebook under warm light,
      or a wave from a train.
      The first thing the eye lands on should be the gesture that carries the feeling.

      Composition must protect quote space.
      Keep the doodle compact and placed in the upper third, upper corner, or one side of the frame.
      Preserve a large clean area of pure white background for the quote.
      The lower two-thirds, or a large central-lower block, should remain visually open,
      with no scattered doodles, no extra symbols, and no clutter breaking up the text area.

      Use negative space intentionally.
      The white space should feel bright, happy, breathable, and premium —
      not empty or unfinished.
      The quote should feel like part of the poster design, not squeezed into leftover space.

      Add tiny supportive details only if they strengthen the scene:
      a few raindrops,
      one little star,
      steam above a cup,
      two motion lines,
      a tiny flower,
      a moon curve,
      a blanket edge,
      or one floating heart if emotionally appropriate.
      Keep these accents sparse and controlled so they do not reduce clarity.

      The overall mood should feel wholesome, affectionate, gentle, and deeply relatable.
      It should make people smile, soften, or feel quietly seen.
      The image should feel save-worthy because it turns a simple emotional moment into something visually sweet and instantly clear.

      NO busy backgrounds, NO textures, NO gradients, NO dense doodle clutter, NO too many tiny icons,
      NO muddy palette, NO overly childish chaos, NO detailed scenery, NO visual noise in the quote area.

