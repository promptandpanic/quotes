      heartfelt body language, and one small wholesome moment that feels human, comforting, and memorable.

      Choose figures and a scene that match the quote’s emotion, such as:
      two friends sharing an umbrella in rain,
      someone journaling at a night window,
      a small figure cheering on a mountain peak,
      a hug from behind,
      two people lying in grass looking up,
      someone releasing a balloon,
