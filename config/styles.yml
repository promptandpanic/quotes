  dark_surreal:
    description: >
      A dark surreal scene rendered with hyperreal painterly detail, designed to feel haunting,
      elegant, and unforgettable at first glance. The image should stop the scroll through one
      dreamlike but inevitable visual idea — strange enough to intrigue, clear enough to understand,
      and emotionally charged enough to linger in the mind.

      Choose one specific surreal scene that matches the quote, such as:
      a lit doorway standing in the middle of a dark ocean,
      a figure walking calmly up a staircase into open sky,
      a person sitting at a dining table in the middle of a forest at night,
      a bed floating in a vast dark lake with warm lamplight overhead,
      a figure watching rain fall upward in a quiet room,
      a window glowing inside a cliff face,
      a chair placed alone under a moonlit beam in open water,
      a room with one wall dissolved into stars,
      or a table set for one at the edge of a void.
      The surreal element must feel poetic and inevitable, not random, cluttered, or chaotic.

      The main hook must come from one unforgettable contradiction:
      something intimate placed inside something vast,
      something domestic placed inside something impossible,
      or something ordinary lit inside something overwhelmingly dark.
      The viewer should feel that the image contains a meaning they almost understand immediately.

      Use a near-black atmospheric environment as the dominant field:
      charcoal, midnight blue, black-green, smoke violet, deep rain grey, or abyssal shadow.
      Then introduce one or two brilliantly lit focal elements only:
      a doorway,
      lamp,
      moonlit edge,
      staircase opening,
      glowing table surface,
      illuminated window,
      or light falling across water.
      The lit areas should hit with force against the darkness and become the emotional center of the image.

      Keep the surrealism controlled and legible.
      Every object, surface, reflection, and shadow should be finely rendered and clearly visible.
      The dreamlike premise should feel vivid and believable inside the painting’s logic.
      This is not chaos, collage, or fantasy overload.
      It should feel like a dream remembered with impossible clarity.

      Composition must create both visual hook and quote space.
      Place the central surreal action in the upper third, one side of the frame, or a strongly contained focal region.
      Preserve a large quiet area of darkness, mist, open water, empty wall, sky, or shadowed atmosphere
      for the quote. The lower two-thirds, or a broad central-lower area, should remain calm enough for text overlay
      without losing the scene’s mood.

      Use negative space intentionally.
      The darkness should breathe.
      Empty areas should heighten mystery, isolation, emotional depth, and story tension.
      The surrounding void should make the lit surreal element feel even more intimate and important.

      Painterly style should be rich and premium:
      fine surface detail,
      nuanced reflections,
      believable shadows,
      controlled brush texture,
      cinematic tonal depth,
      and subtle atmosphere.
      Let water, wood, fabric, air, glass, rain, and light all feel tangible.
      The realism of texture should make the surreal concept hit harder.

      Add supporting details only if they deepen the feeling:
      slight ripples around the floating bed,
      mist gathering around a staircase,
      rain catching light as it rises,
      a chair shadow stretching too far,
      soft reflection of a doorway in black water,
      or tiny particles drifting through a beam.
      These details should reinforce the dream logic without crowding the image.

      The mood should feel contemplative, lonely, profound, and slightly uncanny —
      not horror, not chaos, not visual noise.
      It should feel like a symbolic late-night thought turned into a cinematic painting.

      NO multiple surreal concepts competing in one frame, NO cluttered symbolic objects,
      NO over-bright full-scene lighting, NO fantasy spectacle, NO muddy shadows,
      NO photobashing look, NO messy abstraction, NO detailed clutter in the quote area.

      The final image should feel like a vivid remembered dream:
      dark, precise, emotionally symbolic, and spacious enough for the quote to land with real weight.

