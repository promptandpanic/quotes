      The style must feel authentically watercolor and ink:
      translucent washes,
      soft edges,
      pigment pooling,
      gentle backruns,
      expressive ink contours,
      subtle dry-brush texture,
      and visible paper breathing through the paint.
      It should never feel like flat vector art, glossy digital painting, or overly polished studio illustration.

      The main visual hook must come from ONE vivid saturated watercolor element bleeding dramatically
      against a restrained surrounding palette.
      Everything else should stay soft, airy, and understated.
      The saturated element should feel like an emotional signal flare —
      the first thing the eye lands on and the part that carries the feeling of the quote.

      Use one striking accent color only, such as:
      deep indigo,
      crimson,
      cobalt,
      burnt coral,
      amber gold,
      or rose carmine.
      Let it bloom naturally into the paper with beautiful watercolor diffusion.
      Use that vivid color on one meaningful focal element only:
      the hands,
      the candle flame,
      the rain streak,
      the letter edge,
      the flower center,
      the doorway light,
      the steam glow,
      the bird,
      or a reflection in water.

      Match the vivid color to the emotional mood:
      deep indigo for longing, night thought, quiet sadness, or depth;
      crimson for ache, intimacy, heartbreak, or truth;
      cobalt for clarity, rain, memory, or emotional distance;
      amber gold for warmth, comfort, wisdom, or hope;
      rose carmine or burnt coral for tenderness, softness, and emotional warmth.

      Keep the rest of the palette restrained:
      warm ivory paper,
      pale blush wash,
      misty grey-blue,
      diluted sepia ink,
      soft taupe,
      or barely-there neutral shadows.
      The vivid element should feel rare and luminous because the rest of the painting gives it room.

      Composition must strongly protect quote space.
      Place the painted subject and strongest color concentration in the upper third,
      upper corner, or one compact side of the frame.
      Preserve a large clean region of pale paper, soft wash, or nearly blank textured space
