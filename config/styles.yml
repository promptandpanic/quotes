  minimalist_vector:
    description: >
      A bold flat 2D poster illustration with no human figures, designed to be instantly readable,
      visually striking, and highly memorable at thumbnail size. The image should stop the scroll
      through one iconic concrete symbol, fearless color contrast, and a composition that feels clean,
      intelligent, and effortlessly modern.

      Choose one clear symbolic subject that matches the quote’s message, such as:
      a lighthouse beam cutting through dark water,
      a path forking through a forest,
      a window with warm light spilling out,
      a bridge over still water at dusk,
      a candle casting a long shadow on a table,
      a mountain peak beneath a clear sky,
      a compass resting on a map,
      a hot air balloon over a minimal landscape,
      a staircase lit from above,
      a lone tree against a vivid sky,
      a key beside an open door,
      a moon reflected in a still lake,
      or a boat facing open horizon.
      The subject should be concrete, recognizable, and emotionally suggestive in one glance.

      Use a bold minimalist poster style:
      flat fills only,
      crisp edges,
      simple geometric forms,
      strong silhouette clarity,
      and no unnecessary detail.
      Every shape must feel deliberate.
      The image should read in under one second, but still feel clever and beautifully composed on a second look.

      The visual hook must come from high-contrast color pairing.
      Use no more than 3 bold colors total.
      Strong combinations include:
      deep navy against electric yellow,
      pure black against vivid coral,
      forest green against bright cream,
      indigo against warm ivory,
      rust orange against midnight blue,
      or charcoal against pale gold.
      Let one dark or dominant tone define the structure, one bright contrasting color create the focal punch,
      and one supporting neutral or light color provide breathing room.

      Composition must center around one focal symbol.
      The eye should land immediately on the most meaningful shape:
      the beam of the lighthouse,
      the split in the road,
      the glowing window,
      the staircase opening upward,
      the candle flame and shadow,
      or the balloon against open sky.
      Keep the metaphor simple and visually clean enough to grasp instantly.

      Protect quote space intentionally.
      Place the main symbol in the upper third, far side, or one compact region of the frame.
      Preserve a large calm area of flat color, open sky, still water, or empty poster background
      for the quote. The lower two-thirds, or a large central-lower block, should remain free of
      complex shapes and visual interruptions so the text sits clearly and elegantly.

      Use negative space as an active design tool.
      The emptiness should create sophistication, readability, and visual tension —
      not just unused space. In some cases, the negative space can subtly help define the symbol itself,
      adding a smart poster-design feel that rewards a second glance.

      The mood should feel clear, thoughtful, and emotionally resonant:
      reflective, directional, hopeful, grounded, or quietly profound.
      The design should look like a premium modern poster someone would save because it feels both
