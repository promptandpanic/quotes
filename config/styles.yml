      Keep it compact and visually light.
      It should never dominate the composition.
      The lower third must remain completely clean and empty,
      and the central text area must feel calm and unobstructed.

      The core hook should come from typographic clarity and compositional confidence.
      This card should stop the scroll through elegance, stillness, and a feeling of “this must be worth reading.”
      The quote should feel like the first thing the eye lands on.
      The supporting visual should act like a whisper, not a headline.

      Use negative space generously and intentionally.
      The empty background is not blankness — it is part of the aesthetic.
      It should create focus, pace, and luxury.
      The spacing around the quote should feel deliberate and spacious,
