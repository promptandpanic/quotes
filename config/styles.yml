      two figures silhouetted in a glowing doorway,
      someone sitting alone in a warmly lit café corner,
      a figure at the edge of a platform watching a departing train,
      a person on a fire escape watching the city at night,
      someone slow-dancing alone in a kitchen,
      a woman sitting on the floor beside a bed with one lamp on,
      a figure framed by curtains and moonlight,
      or a person pausing in a hallway where one door spills warm light.
      Every scene should suggest that something meaningful has just happened, or is about to.

      The main hook must come from cinematic lighting and emotional composition.
      Use one believable practical or single-source light as the heart of the scene:
      window light,
      a lamp,
      a café glow,
      a doorway,
      a streetlight,
      train light,
      refrigerator light,
      or moonlight mixed with one warm interior source.
      The light should feel like an active emotional presence, not just illumination.

      Build strong warm-vs-cool contrast into the color grading.
      Use warm amber, honey, candle gold, or muted orange where emotion lives,
      and cool blue, slate, charcoal, indigo, or rainy grey in the surrounding shadows.
      The warmth should feel intimate and human.
      The cool tones should create loneliness, night, mystery, or distance.
      This contrast should create immediate visual pull and cinematic depth.

      Composition must create both story and quote space.
      Keep the main figure or central action compact and placed to one side, in the upper third,
      or framed within a contained area such as a doorway, window, corner table, platform edge,
      or section of room. Preserve a large calm area of wall, darkness, rain haze, soft shadow,
      empty window space, sky, or floor for the quote.
      The lower two-thirds, or a broad central-lower area, should remain visually quiet enough for text
      without breaking the cinematic mood.

      Use negative space intentionally as part of the narrative.
      Empty darkness, blank wall, rain-softened air, hallway distance, or quiet floor space should
      help express solitude, tension, longing, or reflection.
      The emptiness around the figure should feel meaningful and cinematic, not unfinished.

      Add subtle environmental details that deepen the story without cluttering the frame:
      steam from a cup,
      rain on glass,
      a half-open letter,
      train light fading away,
      curtain movement,
      reflections on wet pavement,
      dust in a beam of light,
      a chair slightly pulled back,
      a soft table shadow,
      or city lights beyond a window.
      Every detail should support the emotional reading of the quote.

      The painted or illustrated style should feel premium and textured:
      soft brushwork,
      nuanced surfaces,
      controlled detail,
      cinematic color grading,
      and believable atmosphere.
      It should feel more like concept art or editorial illustration than fantasy art or character art.
      Story and mood matter more than facial detail.

      The scene should feel intimate, melancholic, romantic, reflective, or quietly profound,
