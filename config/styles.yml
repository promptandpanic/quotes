# Visual style configuration for @_daily_dose_of_wisdom__
#
# Each style:
#   description — creative brief sent to Gemini; it writes the image_prompt
#   categories  — which posting slots this style appears in
#   weight      — high / medium / low (controls selection probability)
#
# Design philosophy:
#   Image = the scroll-stopping hook. Text appears after.
#   Every style must be instantly distinctive from typical AI quote imagery.
#   Avoid overly Indian imagery everywhere — cultural context only when quote calls for it.
#   Object variety: descriptions list MANY possible subjects — pick one that fits the quote.

styles:

  # ── HIGH VISUAL IMPACT — the scroll-stoppers ─────────────────────────────

  ghibli_anime:
    description: >
      2D hand-drawn animation frame inspired by classic Japanese animated cinema. VISUAL HOOK:
      extreme contrast between a tiny warm-lit figure and a vast, dramatically colored landscape.
      Choose the setting and scene to match the quote — examples: a small figure on a cliff edge
      watching electric indigo clouds, someone cycling through a glowing autumn tunnel, a child
      reaching toward oversized glowing spirits in a mist-filled forest, a lone traveller on a
      mountain pass as stars emerge, a figure on a rooftop watching lanterns rise, someone at a
      rain-soaked station with one warm window illuminated. Sky palette is always punchy — electric
      indigo, blazing gold horizon, deep teal with white star scatter. The contrast between the
      intimate figure and epic scale is the scroll-stopper. 1990s anime aesthetic — painterly,
      perfectly composed.
    categories: [morning, love, goodnight, mindfulness, wisdom]
    weight: high

  whimsical_sketch:
    description: >
      Hand-drawn pencil sketch on warm cream — loose expressive lines. Choose the subject to
      match the quote's emotion — examples: a figure standing in wind with hair flying, two hands
      almost touching, someone looking out of a rain-streaked window, a person at a crossroads,
      a lone tree in a wide field, birds lifting from a branch, a figure reading in a beam of
      light. MAXIMUM CONTRAST RULE: the selective color must be SHOCKING against the greyscale
      base. The chosen element bursts in electric cobalt, acid yellow, blood red, or neon emerald
      while everything else stays graphite. The color pop should feel almost violent against the
      grey — that extreme tonal jump freezes the thumb mid-scroll. Never fully colored, never
      fully grey. The single vivid element must be the first thing the eye lands on.
    categories: [wisdom, love, goodnight, latenight, morning]
    weight: high

  silhouette_landscape:
    description: >
      A tiny sharp black silhouette against a HIGH CONTRAST sky — choose the silhouette and
      setting to suit the quote. Examples: a single figure on a hilltop, a person standing on
      a dock over still water, someone at a window ledge watching the horizon, a figure in a
      rowboat on a glassy lake, two people on a beach facing the ocean, a person sitting on a
      rooftop at dusk, a lone tree and small figure on a vast plain. Sky must be dramatically
      graduated — deep electric orange at the horizon bleeding into violet then near-black, or
      a blindingly white moon against midnight indigo. Perfect mirror reflection doubles visual
      impact. The silhouette must be pure black, the sky vivid and saturated — the contrast
      between the two IS the hook.
    categories: [mindfulness, morning, wisdom, goodnight]
    weight: high

  nocturnal_aesthetic:
    description: >
      Atmospheric night scene with BOLD warm-vs-cool color contrast. Choose the scene to match
      the quote's emotion — examples: a moonlit lane with lit windows and glowing cherry blossoms,
      a rooftop under aurora ribbons in electric cyan and violet, fireflies over a dark meadow,
      a figure at a lamppost in a quiet rain-slicked street, lanterns floating over dark water,
      a small illuminated café in an otherwise dark alley, a lit window in a sleeping village,
      warm lights strung across a dark terrace. KEY: extreme contrast between deep cold backgrounds
      (midnight blue, dark plum) and blazing warm light sources (gold, amber, coral). Push the
      saturation further than feels safe — makes late-night emotions feel electric, not just soft.
    categories: [latenight, goodnight, love, mindfulness]
    weight: high

  minimalist_line_art:
    description: >
      Precise, detailed ink illustration — fine confident linework on warm cream or white.
      Choose the subject to match the quote — examples: a face in profile with expressive detail,
      two figures leaning toward each other, hands almost touching, a figure curled in thought,
      someone writing at a desk by lamplight, a person at a window watching rain, a figure
      releasing birds. NOT a single abstract stroke — the drawing must be clearly readable and
      finely rendered, like a high-quality editorial illustration. CONTRAST RULE: one saturated
      color accent used deliberately — crimson red, cobalt blue, pure gold, or electric teal —
      on a specific element (a scarf, a light source, a detail). Clean white ground, detailed
      black linework, one vivid accent. Clarity and precision is the aesthetic.
    categories: [wisdom, love, mindfulness, latenight]
    weight: high

  metaphorical_digital:
    description: >
      Dark cinematic digital painting where the image IS the concept. Choose the metaphor to
      match the quote — examples: a person watering a wilting plant in a rainstorm, hands holding
      broken glass that reflects stars, a figure walking toward a lit doorway in total darkness,
      two people growing apart like diverging tree roots, someone building a ladder in a dark
      pit toward a circle of light, a figure standing still while the world blurs around them,
      a hand releasing birds made of paper, a person sitting in a room where one wall is open
      sky. CONTRAST HOOK: near-total darkness with one blazing light source — the lit element
      should pop with almost physical force against a near-black base. Palette: deep charcoal
      base, then one electric accent — amber, rose gold, electric blue.
    categories: [latenight, wisdom, love]
    weight: high

  # ── WARM & PERSONAL ──────────────────────────────────────────────────────

  vector_girl:
    description: >
      Clean flat 2D vector illustration of a stylised girl figure — warm, expressive, graphic.
      Choose the pose and setting to match the quote's mood — examples: sitting cross-legged
      reading a book, standing in wind with eyes closed, looking out a window in thought,
      writing in a journal, walking alone in evening light, arms stretched wide, sitting on
      steps with a cup, dancing alone in a room, lying in grass looking up, standing in rain
      with eyes open. CONTRAST RULE: bold complementary color pairing — electric teal outfit
      against warm peach, cobalt jacket against vivid mustard, burgundy against sage. Attire
      is modern casual for everyday themes, traditional only when culturally resonant. 4-5
      color palette, punchy and clean. Color contrast stops the scroll, pose carries emotion.
    categories: [love, goodnight]
    weight: high

  vector_couple:
    description: >
      Clean flat 2D vector — two illustrated figures. Choose the moment to match the quote —
      examples: leaning toward each other not quite touching, walking side by side in silence,
      one resting head on the other's shoulder, sitting back to back reading, sharing an
      umbrella, one reaching toward the other across a gap, sitting on a bench watching
      something together, slow dancing in a small room, one figure walking away while the
      other watches. CONTRAST: figures in warm tones (terracotta, blush, amber) against a cool
      high-contrast backdrop (deep teal, indigo, slate), or warm-lit figures against a cool
      dark environment. Instantly legible at thumbnail size — the color contrast creates depth.
    categories: [love, goodnight]
    weight: high

  watercolour_ink:
    description: >
      Hand-painted watercolour on cold-press paper texture — delicate bleeds, ink line details,
      deeply organic. Choose the subject to match the quote — examples: two hands almost
      touching, a single candle flame against dark, rain on a window pane, a face in profile
      looking away, a flower opening, a bird mid-flight, a figure in a doorway, a teacup with
      rising steam, a letter half-written, a tree reflected in still water. CONTRAST HOOK: one
      vivid color bleeds dramatically against a near-white or complementary wash — deep indigo
      hands against warm rose blush, a single crimson candle flame against cool grey-blue,
      cobalt rain on ivory paper. Palette is otherwise restrained so the ONE saturated element
      hits like a signal flare. Feels genuinely handmade.
    categories: [love, mindfulness, goodnight, wisdom]
    weight: high

  cozy_aesthetic:
    description: >
      A perfectly composed scene with EXTREME FOREGROUND CONTRAST. Choose the foreground
      element to match the quote's energy — examples: a steaming mug with rising wisps, a
      candle flame that is genuinely bright, an open journal with visible ink on a wooden
      surface, a held book spine-up, a hand wrapped around a warm glass, a half-eaten piece
      of toast on a plate, a phone face-down next to a flower, fairy lights tangled in a
      jar. The chosen element should be hyper-real and sharp while everything behind it
      dissolves to near-abstract warm bokeh. Bokeh balls should be bright white-gold, not
      just yellow. Amber-gold and honey tones throughout. Compositionally tight — never a
      wide room shot. Sharpness-vs-blur contrast creates magnetic depth.
    categories: [goodnight, latenight, love, mindfulness]
    weight: high

  # ── CLEAN & BOLD ─────────────────────────────────────────────────────────

  minimalist_vector:
    description: >
      Bold flat 2D poster illustration — clean, graphic, and immediately readable. No human
      figures. Choose a clear concrete symbol to match the quote — examples: a lighthouse beam
      cutting through dark water, a path forking through a forest, a window with warm light
      spilling out, a bridge over still water at dusk, a candle casting a long shadow on a table,
      a mountain peak with a clear sky, a compass on a map, a hot air balloon over a landscape,
      a staircase lit from above, a lone tree against a vivid sky. Every element should be
      purposeful and clearly recognizable. CONTRAST IS THE STYLE: maximum 3 bold colors —
      deep navy against electric yellow, pure black against vivid coral, forest green against
      bright cream. Flat fills, crisp edges, no gradients, no textures. Reads in under one
      second at thumbnail size.
    categories: [morning, wisdom, mindfulness]
    weight: medium

  minimalist_nature:
    description: >
      One powerful natural element in extreme negative space. Choose the subject to match the
      quote's mood — examples: a single bare branch with one blossom, a rain-caught spider web
      at dawn, a crescent moon over dark water, a lone tree on a ridge at dusk, a single
      falling leaf, a stone in rippling water, one bird on a wire, a fern uncurling, a reed
      in still water, a single blade of grass with a drop. CONTRAST RULE: the subject must
      be near-black against a near-white background or near-white against a deep charcoal
      background — no soft middle tones. Pure dark subject, pure light ground, or vice versa.
      The image holds its breath. Extreme tonal contrast creates the tension introspective
      quotes need to land.
    categories: [mindfulness, wisdom, goodnight, latenight]
    weight: medium

  wholesome_doodle:
    description: >
      Simple charming doodle — choose figures and a moment that match the quote's emotion.
      Examples: two friends sharing an umbrella in rain, someone journaling at a night window,
      a small figure cheering at a mountain peak, a hug from behind, two people lying in grass
      looking up, someone releasing a balloon, a figure building a snowman alone, two figures
      pinky-promising, someone sleeping under a blanket of stars, a hand waving from a
      departing train window. CONTRAST RULE: thick bold black outlines on pure white, flat
      fills in vivid complementary pairs — cobalt blue and warm coral, forest green and
      golden yellow, deep purple and peach. Bold line + vivid flat fill + white background =
      maximum graphic clarity at any size.
    categories: [morning, love, latenight]
    weight: medium

  risograph_print:
    description: >
      Duotone risograph print — a clearly composed scene with bold graphic character. Choose a
      specific, readable subject: a figure on a rooftop watching the city, two people walking
      under a large moon, a person cycling past illuminated shop fronts, someone reading under
      a large window, a forest path with dappled light, a coastal cliff at dusk, a couple on a
      bench by water. Subject must be specific and clearly legible — not vague shapes.
      The entire image rendered in two high-contrast overlapping inks with slight misregistration
      giving a hand-printed feel. CONTRAST RULE: the two inks must be bold complementaries —
      indigo + warm cream, deep teal + vivid coral, dark navy + acid yellow, forest green + peach.
      The grain and misregistration add texture but must not obscure the scene's clarity.
    categories: [wisdom, latenight, mindfulness]
    weight: medium

  # ── ACCENT — used sparingly for high impact ──────────────────────────────

  cinematic_portrait:
    description: >
      A richly detailed cinematic scene — painterly, dramatic, deeply composed. NOT a photo,
      NOT a portrait of a real person — a painted or digitally illustrated scene with a strong
      sense of story and atmosphere. Choose the scene to match the quote — examples: a figure
      in a dimly lit room reading a letter by window light, a person standing in a rain-lit
      street at night, two figures silhouetted in a glowing doorway, someone sitting alone in
      a warmly lit café corner, a figure at the edge of a platform watching a departing train,
      a person on a fire escape watching the city at night, someone slow-dancing alone in a
      kitchen. Lighting is the mood: warm amber vs cool shadows, single practical light source,
      cinematic colour grading. Painted or illustrated aesthetic — fine details, textured surfaces,
      emotional depth. Every element should contribute to the story of the quote.
    categories: [latenight, love, wisdom, goodnight]
    weight: medium

  dark_surreal:
    description: >
      A surreal scene rendered with hyperreal painterly detail — dreamlike premise, but everything
      in the frame is finely rendered and clearly visible. Choose a specific scene: a lit doorway
      standing in the middle of a dark ocean, a figure walking calmly up a staircase into open
      sky, a person sitting at a dining table in the middle of a forest at night, a bed floating
      in a vast dark lake with warm lamplight overhead, a figure watching rain fall upward in a
      quiet room. The surreal element must feel inevitable — not chaotic. CONTRAST: near-black
      atmospheric setting with one or two brilliantly lit focal elements. Painterly texture,
      fine detail in every surface. The image should feel like a dream remembered vividly.
    categories: [latenight, wisdom]
    weight: low
