      a dreamy background dissolved into glowing warm bokeh and soft blur.

      Choose the foreground element to match the quote’s emotional energy, such as:
      a steaming mug with rising wisps,
      a candle flame burning brightly,
      an open journal with visible ink on a wooden surface,
      a held book spine-up,
      a hand wrapped around a warm glass,
      a half-eaten piece of toast on a plate,
      a phone face-down beside a flower,
      fairy lights tangled in a jar,
