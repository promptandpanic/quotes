# Visual style configuration for @_daily_dose_of_wisdom__
#
# Each style:
#   description — creative brief sent to Gemini; it writes the image_prompt
#   categories  — which posting slots this style appears in
#   weight      — high / medium / low (controls selection probability)
#
# Design philosophy:
#   Image = the scroll-stopping hook. Text appears after.
#   Every style must be instantly distinctive from typical AI quote imagery.
#   Avoid overly Indian imagery everywhere — cultural context only when quote calls for it.
#   Object variety: descriptions list MANY possible subjects — pick one that fits the quote.

styles:

  # ── HIGH VISUAL IMPACT — the scroll-stoppers ─────────────────────────────

  ghibli_anime:
    description: >
      A breathtaking 2D hand-painted animation frame inspired by classic 1990s Japanese animated cinema,
      designed to feel instantly transportive, nostalgic, and emotionally unforgettable. The image must create
      an immediate scroll-stopping hook through one powerful contrast: a tiny human figure carrying a warm,
      intimate emotional moment inside an enormous, dreamlike world.
  
      The subject should feel small, tender, and personal against a vast, cinematic landscape that feels alive
      with atmosphere. The emotional magic comes from scale: the world is huge, luminous, and full of wonder,
      while the figure feels quiet, solitary, and deeply human.
  
      Choose a scene that matches the quote’s emotional tone, such as:
      a lone figure standing at the edge of a cliff beneath electric indigo storm clouds,
      someone cycling through a glowing autumn tree tunnel at dusk,
      a child reaching toward oversized luminous spirits in a misty forest,
      a quiet traveler on a mountain path as the first stars appear,
      a figure on a tiled rooftop watching lanterns drift into the night sky,
      someone waiting at a rain-soaked countryside station with one warm amber window glowing,
      a person crossing a meadow while wind bends the grass in silver waves,
      or a solitary figure near a lakeshore reflecting a surreal sky.
  
      Composition must feel cinematic and emotionally precise:
      use a wide shot with deep environmental storytelling,
      place the figure small within the frame to emphasize awe, longing, peace, or loneliness,
      and let the landscape act like a character of its own.
      Use strong foreground, midground, and background depth when possible.
      The viewer should feel they have stepped into a remembered dream.
  
      Build the image around a striking sky and atmosphere:
      electric indigo clouds,
      blazing gold horizon light,
      deep teal twilight,
      violet dusk haze,
      luminous moon glow,
      white star scatter,
      drifting mist,
      glowing lanterns,
      reflected water light,
      or soft rain illuminated by a hidden warm source.
      The sky should not just sit in the background — it should carry emotional weight.
  
      Add irresistible visual hooks that make the frame feel alive:
      a single warm window in the distance,
      birds crossing the sky,
      floating lanterns,
      drifting leaves,
      glowing spirits,
      telephone wires cutting across sunset light,
      wind through clothing and grass,
      ripples in puddles,
      a bicycle light,
      or a path disappearing into luminous fog.
      These details should create curiosity and wonder without clutter.
  
      Color palette should be rich, painterly, and nostalgic:
      saturated but elegant indigo, teal, moss green, golden amber, rust orange, moonlit cream,
      soft charcoal, dusty pink sunset, storm blue, and warm lantern gold.
      Use warm-cool contrast aggressively to create emotional pull:
      warm light for the figure or a tiny point of human life,
      cool vastness for the surrounding world.
  
      The overall feeling should be wistful, magical, cinematic, tender, nostalgic,
      slightly melancholic, and deeply comforting.
      It should feel like a still frame from a beloved animated film that people want to pause on,
      save, and stare at for a few extra seconds.
  
      The image should make the viewer feel there is a story just before or just after this frame.
      It should feel like a private emotional universe: quiet, expansive, luminous, and unforgettable.

      Composition must protect quote space.
      Place the tiny figure and the scene's main focal point in the LOWER THIRD or to one side of the frame.
      Preserve a large, visually calm area of sky, open atmosphere, soft gradient, misty horizon,
      or gently glowing negative space across the upper two-thirds or a broad central region for the quote.
      The sky carries both emotional weight and the text — these two jobs must not compete.
      No busy cloud texture, no dense tree canopies, no lantern clusters, and no visual complexity
      should intrude into the zone where the quote will sit.
      The open area should feel breathable, luminous, and poetic — spacious by design, not empty by accident.

      Style must remain hand-drawn, painterly, and animation-cel inspired — never photorealistic,
      never 3D, never glossy digital fantasy art.

      NO busy skylines crowding the whole frame, NO dense foreground AND background simultaneously,
      NO multiple focal points competing at every edge, NO heavy detail in the quote zone,
      NO photorealism, NO generic fantasy art aesthetics, NO clutter masking the emotional scale contrast.
    categories: [morning, love, goodnight, mindfulness, wisdom]
    weight: high

  whimsical_sketch:
    description: >
      A hand-drawn pencil sketch on a warm cream paper background, designed to feel intimate,
      emotionally charged, and instantly arresting in the feed. The image should look like a private
      thought caught in a sketchbook — loose, expressive, imperfect, and full of feeling — but with one
      unforgettable visual hook that makes the viewer stop.

      The core concept is contrast:
      a soft greyscale graphite world interrupted by ONE vivid, electrifying accent color that lands
      immediately in the eye. The sketch should feel poetic and human, while the color accent feels
      unexpected, sharp, and impossible to ignore.

      Choose the subject and scene to match the quote’s emotion, such as:
      a figure standing in wind with hair flying,
      two hands almost touching but not quite,
      someone looking out of a rain-streaked window,
      a person standing at a crossroads,
      a lone tree in a wide empty field,
      birds lifting suddenly from a branch,
      a figure reading in a beam of light,
      a girl sitting on the floor beside a bed,
      a person under a streetlamp at dusk,
      or a solitary figure walking away through open space.

      The style should remain hand-sketched and expressive:
      visible pencil lines,
      soft graphite smudges,
      raw line variation,
      gentle imperfection,
      and elegant incompleteness.
      It should feel artistic and emotional, not polished or over-finished.

      The visual hook must come from one selective-color focal element only.
      Everything else stays in graphite, charcoal, soft grey, and cream paper tones.
      The chosen accent should burst forward in a way that freezes the thumb mid-scroll.
      Use one striking color only, such as:
      electric cobalt,
      acid yellow,
      blood red,
      neon emerald,
      hot orange,
      or vivid magenta.
      The accent color should appear in just one emotionally meaningful area:
      a ribbon,
      a flower,
      the sun or moon,
      a tear,
      a window glow,
      a bird,
      a heart-like mark,
      an umbrella,
      a single sleeve,
      a beam of light,
      or a line of thread connecting two elements.

      The accent must feel symbolic, not decorative.
      It should carry the emotional charge of the quote:
      blood red for ache, desire, heartbreak, or truth;
      electric cobalt for longing, distance, intuition, or nighttime thought;
      acid yellow for realization, memory, hope, or sudden clarity;
      neon emerald for inner unrest, transformation, or strange emotional electricity;
      vivid magenta or orange for intensity, tenderness, or emotional heat.

      Composition must be designed around quote space.
      Place the sketch mostly in the UPPER THIRD or upper-left / upper-right area of the frame,
      keeping the subject compact and visually controlled.
      The lower two-thirds, or at minimum a large central-lower block, must remain empty warm cream space
      for the quote. This blank space is intentional and essential to the aesthetic.
      No sketch lines, no color splashes, no texture buildup, and no important details should intrude
      into the quote area.

      Make the image feel alive through emotional motion:
      hair blown by wind,
      a sleeve pulling back,
      birds mid-lift,
      rain lines on glass,
      a page turning,
      a hand hesitating,
      branches bending,
      or a colored thread drifting across the air.
      These subtle movements should create narrative tension and make the frame feel like a story paused
      one second before or after something meaningful.

      Use negative space intelligently.
      The emptiness should create breathing room, emotional pause, and elegance rather than looking unfinished.
      The final image should feel like a premium editorial sketch, a poetic journal page, or an artful saved
      Instagram post that is both visually striking and quote-friendly.

      NO fully colored illustrations, NO busy backgrounds, NO dense shading across the page,
      NO multiple accent colors, NO clutter, NO realistic rendering, NO cartoon look,
      NO decorative patterns, NO color floods bleeding into the quote space.

      The final result should feel delicate yet intense:
      soft graphite, one shocking emotional color, strong storytelling, and enough negative space
      to let the quote land beautifully.

    categories: [wisdom, love, goodnight, latenight, morning]
    weight: high

  silhouette_landscape:
    description: >
      A striking, cinematic landscape built around one unforgettable contrast:
      a tiny pure-black silhouette against a vivid, emotionally charged sky.
      The image should feel instantly scroll-stopping, mysterious, and emotionally spacious —
      like a poster frame that makes someone pause before they even read the quote.
  
      The silhouette must be extremely simple and graphic:
      a single figure on a hilltop,
      a person standing on a dock over still water,
      someone at a window ledge watching the horizon,
      a figure in a rowboat on a glassy lake,
      two people on a beach facing the ocean,
      a person sitting on a rooftop at dusk,
      a lone tree with a small figure beneath it,
      or a solitary person on an empty plain, ridge, or shoreline.
      The silhouette should be pure black with crisp edges and no visible detail.
      It must feel small against the world, so the scale creates emotion.
  
      The sky is the main hook.
      Make it dramatic, saturated, and luminous:
      deep electric orange melting into violet and then near-black,
      a blinding white moon against midnight indigo,
      ember-red dusk fading into bruised purple,
      teal-blue twilight with silver clouds,
      or a glowing horizon line under a dark vast sky.
      The sky should feel alive with atmosphere and emotional meaning, not just pretty color.
  
      Add subtle storytelling elements that make the frame feel like a moment suspended in time:
      birds crossing the distance,
      one faint star appearing,
      a moon reflection trembling in water,
      low mist over a field,
      a soft path leading nowhere,
      a single glowing horizon band,
      distant city lights,
      or wind moving tall grass.
      These details should create narrative pull without breaking the minimal silhouette style.
  
      Use composition to create both visual hook and quote space.
      Keep the silhouette compact and positioned in the upper third, far left, far right,
      or along a low horizon line so the scene feels expansive.
      Preserve a large clean area of open sky, water, or softly graded atmosphere for the quote.
      At least the lower or central two-thirds should remain visually calm and uncluttered,
      with no busy objects, no dense cloud textures, and no detail-heavy scenery interfering with text.
  
      If water is present, use a mirror-like reflection to double the emotional impact.
      Reflections should be clean, symmetrical, and serene — never noisy.
      They should intensify the feeling of stillness, distance, and wonder.
  
      The emotional tone should feel contemplative, cinematic, and universally relatable:
      solitude, peace, longing, closure, awe, tenderness, or quiet healing.
      The viewer should be able to project themselves into the silhouette.
  
      Use very strong contrast:
      the silhouette must be the darkest possible black,
      the sky must be vivid and radiant,
      and the boundary between them should feel sharp and memorable.
      This light-dark contrast is the primary thumb-stopping device.
  
      The final image should feel like a premium minimalist film poster or poetic visual quote card:
      dramatic but clean, emotional but spacious, beautiful but highly readable.
  
      NO facial detail, NO textured black shadows, NO cluttered foregrounds, NO extra props,
      NO busy tree lines across the quote area, NO heavy cloud chaos where text should sit,
      NO photorealistic rendering, NO dull muted skies, NO visual noise.
  
      The image should feel like there is a story behind the silhouette,
      but enough silence around it for the quote to breathe.
  
    categories: [mindfulness, morning, wisdom, goodnight]
    weight: high

  nocturnal_aesthetic:
    description: >
      An atmospheric night scene designed to feel cinematic, intimate, and instantly magnetic in the feed.
      The image should create a powerful scroll-stopping hook through bold warm-vs-cool contrast:
      deep nocturnal darkness surrounding one or more glowing warm light sources that feel emotional,
      not just decorative.
  
      Choose a scene that matches the quote’s feeling, such as:
      a moonlit lane with lit windows and glowing cherry blossoms,
      a rooftop under aurora ribbons in electric cyan and violet,
      fireflies drifting above a dark meadow,
      a solitary figure under a lamppost on a quiet rain-slicked street,
      lanterns floating over still dark water,
      a tiny illuminated café in an otherwise dark alley,
      a single lit window in a sleeping village,
      warm string lights across a shadowy terrace,
      a person standing by a train platform under a night sky,
      or a balcony glowing softly against a nearly black city silhouette.
  
      The emotional hook must come from color temperature contrast.
      Push the cold background into rich midnight blue, dark plum, charcoal violet, indigo-black,
      storm teal, or deep forest night.
      Then place blazing pockets of warm light in gold, amber, honey, coral, candle orange,
      peach-glow, or lantern yellow.
      The warmth should feel like human emotion inside the night:
      longing, comfort, memory, intimacy, hope, or quiet ache.
  
      Make the contrast bold and unapologetic.
      The warm light should feel almost unreal against the dark atmosphere —
      like something glowing from the inside of the scene.
      Push saturation enough to feel electric and emotionally heightened, but still tasteful and cinematic.
      The image should feel more alive and charged than a typical soft night aesthetic.
  
      Build in subtle visual hooks that make people pause:
      reflections in rain puddles,
      steam rising from a window,
      drifting petals or fireflies,
      glowing lantern trails,
      a half-open café door,
      one lit window in a sea of darkness,
      a bicycle left under a streetlamp,
      wet pavement catching amber light,
      or a figure’s silhouette just barely touched by warmth.
      These details should create curiosity and make the viewer feel a story is unfolding quietly.
  
      Composition must protect quote space.
      Keep the main subject and brightest lights concentrated in the upper third, one side of the frame,
      or around a compact focal zone.
      Preserve a large clean region of dark sky, softly graded wall, open water, or low-detail night air
      for the quote. At least the lower or central two-thirds should remain visually calm enough for text
      to sit clearly without fighting bright highlights or busy detail.
  
      Use negative space intentionally.
      Darkness should feel luxurious, deep, and breathable — not empty, muddy, or unfinished.
      The quote area should be smooth, legible, and elegant, with minimal texture noise.
  
      The mood should feel like late-night emotion at its most beautiful:
      intimate, electric, lonely, romantic, reflective, tender, and slightly melancholic.
      The image should feel save-worthy — something people want to linger on because it feels like
      a night they remember.
  
      Style can be painterly digital illustration, cinematic semi-flat art, or atmospheric editorial scene,
      but never photorealistic, never cluttered, and never over-rendered.
      Keep forms readable, light sources intentional, and the emotional contrast between warmth and darkness
      as the main storytelling device.
  
      NO busy city crowds, NO too many light sources, NO flat dull darkness, NO muddy color,
      NO harsh neon overload, NO clutter in the text area, NO detailed architecture taking over the frame,
      NO decorative stars everywhere, NO visual noise.
  
      The final image should feel like a beautiful secret:
      dark, glowing, emotionally charged, and spacious enough for the quote to land with impact.
  
    categories: [latenight, goodnight, love, mindfulness]
    weight: high

  minimalist_line_art:
    description: >
      A refined editorial ink illustration on warm cream or clean white, designed to feel elegant,
      emotionally intelligent, and instantly engaging without visual noise. The image should stop the scroll
      through clarity, precision, and one unforgettable accent — not through clutter or over-decoration.
  
      Create a finely rendered black ink line drawing with confident, deliberate linework.
      The subject should be clearly readable, emotionally expressive, and beautifully composed.
      This is not a loose abstract scribble and not a single continuous line gimmick.
      It should feel like a premium magazine illustration or literary editorial artwork:
      minimal, precise, thoughtful, and rich with quiet emotional tension.
  
      Choose a subject that matches the quote’s feeling, such as:
      a face in profile with subtle expression,
      two figures leaning slightly toward each other,
      hands almost touching,
      a figure curled inward in thought,
      someone writing at a desk by lamplight,
      a person at a window watching rain,
      a figure releasing birds,
      a woman holding a letter,
      a person sitting at the edge of a bed,
      or a solitary figure beneath a hanging light.
      The scene should feel intimate and symbolic, but visually clean.
  
      The drawing style should use:
      fine confident black lines,
      elegant contour work,
      selective interior detail,
      restrained shadow only if necessary,
      and strong shape clarity.
      Every line should feel intentional.
      The illustration must be detailed enough to feel premium and emotionally specific,
      but still minimal enough to preserve openness and calm.
  
      The main visual hook must come from ONE deliberate saturated color accent only.
      Use a single vivid color on one meaningful element:
      crimson red,
      cobalt blue,
      pure gold,
      or electric teal.
      The accent can appear on a scarf, lamp glow, letter edge, ribbon, bird, rain detail,
      sleeve, thread, window light, flower, or another emotionally symbolic focal point.
      The accent should guide the eye immediately and create a strong emotional anchor.
  
      Match the accent color to the quote’s emotional tone:
      crimson red for longing, ache, devotion, honesty, or heartbreak;
      cobalt blue for distance, thoughtfulness, night emotion, or introspection;
      pure gold for wisdom, hope, memory, tenderness, or quiet revelation;
      electric teal for emotional freshness, release, clarity, or an unexpected inner shift.
  
      Composition must strongly protect quote space.
      Place the illustrated subject in the upper third, upper corner, or one compact side of the frame.
      Keep the lower two-thirds, or a large central-lower area, completely open and calm for the quote.
      The empty area should remain mostly untouched white or cream paper with no dense linework,
      no important details, and no color accents interfering with readability.
  
      Use negative space as part of the design language.
      The emptiness should feel intentional, premium, and restful — like editorial layout space,
      not unfinished blankness. The quote area should breathe.
  
      Add subtle narrative tension through posture and detail:
      a hand pausing before contact,
      a gaze turned away,
      rain gathering at the window,
      birds just beginning to lift,
      a letter half-folded,
      a lamp glowing in stillness,
      or fabric shifting slightly as if something has just been felt.
      The image should feel like a quiet emotional moment caught precisely in time.
  
      The final effect should feel clean, literary, artistic, and save-worthy:
      black ink precision, one vivid emotional accent, and enough white space
      for the quote to land beautifully.
  
      NO messy sketch lines, NO multiple accent colors, NO fully colored illustration,
      NO decorative background textures, NO cluttered scenes, NO cartoon style,
      NO photorealism, NO heavy shading, NO visual noise in the text area.
  
      The image should feel thoughtful at first glance and emotionally deeper on the second look.
  
    categories: [wisdom, love, mindfulness, latenight]
    weight: high

  metaphorical_digital:
    description: >
      A dark cinematic digital painting where the image itself is the meaning.
      The scene should feel like a visual metaphor made visible — emotionally sharp, instantly intriguing,
      and powerful enough to stop someone mid-scroll before they even read the quote.

      Build the composition around one clear symbolic concept that matches the quote’s emotion, such as:
      a person watering a wilting plant in a rainstorm,
      hands holding broken glass that reflects stars,
      a figure walking toward a lit doorway in total darkness,
      two people growing apart like diverging tree roots,
      someone building a ladder inside a dark pit toward a circle of light,
      a figure standing still while the world blurs around them,
      a hand releasing birds made of paper,
      a person sitting in a room where one wall opens into sky,
      a heart-shaped crack glowing through stone,
      or a staircase dissolving into light above a shadowed figure.
      The metaphor should be immediately graspable but emotionally layered.

      The main hook must come from dramatic light in near-total darkness.
      Use a deep charcoal, black-blue, or near-black base for most of the image,
      then introduce ONE blazing light source or illuminated symbolic element that hits with almost physical force.
      The glow should feel concentrated, meaningful, and impossible to ignore:
      a doorway of amber light,
      electric blue stars in shattered glass,
      rose-gold light spilling from a crack,
      a ladder lit from above,
      birds turning luminous as they leave the hand,
      or a circle of light suspended in darkness.

      The image should feel cinematic, emotional, and concept-driven — not fantasy clutter, not horror,
      not generic surrealism. Every element must serve the metaphor.
      Keep the scene simple enough to be understood in one glance, but rich enough to feel worth staring at longer.

      Use a restrained palette:
      deep charcoal, blackened navy, soft smoke, muted shadow tones,
      plus one electric accent only — amber, rose gold, or electric blue.
      Let that accent color become the emotional pulse of the scene.
      Match the accent to the quote’s tone:
      amber for hope, memory, warmth, guidance, or rescue;
      rose gold for tenderness, heartbreak, longing, or fragile beauty;
      electric blue for distance, clarity, awakening, loneliness, or inner truth.

      Create a strong focal path for the eye.
      The viewer should land first on the glowing symbolic element,
      then move outward into the surrounding darkness and metaphorical context.
      Use light falloff, shadow, and composition to control that journey.
      Darkness should not feel empty; it should feel heavy with meaning.

      Protect quote space intentionally.
      Keep the metaphorical focal action compact and placed in the upper third, upper side,
      or one contained region of the frame.
      Preserve a large calm area of dark negative space — smooth shadow, empty wall, open night air,
      or softly graded darkness — for the quote.
      At least the lower or central two-thirds should remain visually quiet enough for text overlay,
      with no busy textures, no detail clutter, and no bright interruptions.

      Add subtle cinematic atmosphere if it supports the concept:
      dust in a beam of light,
      faint mist,
      particles floating from the glowing area,
      long soft shadows,
      smoke trailing upward,
      or a dim sense of depth behind the subject.
      These details should enhance mystery and emotion without reducing clarity.

      The final image should feel profound, intimate, and slightly haunting —
      like a thought turned into a dream-symbol.
      It should invite the viewer to feel something first and understand it fully a second later.

      NO multiple metaphors fighting each other, NO crowded surreal objects, NO bright full-scene lighting,
      NO photorealism, NO over-detailed fantasy environments, NO muddy shadows, NO visual noise in the quote area,
      NO more than one main accent color.

      The result should feel like a premium conceptual poster:
      dark, elegant, emotionally symbolic, and spacious enough for the quote to land with force.

    categories: [latenight, wisdom, love]
    weight: high

  # ── WARM & PERSONAL ──────────────────────────────────────────────────────

  vector_girl:
    description: >
      A clean flat 2D vector illustration of a stylized girl figure, designed to feel warm,
      emotionally expressive, modern, and instantly eye-catching in the feed. The image should
      stop the scroll through bold color contrast, a relatable human pose, and a composition
      that feels graphic, polished, and highly shareable.

      Choose a pose and setting that match the quote’s mood, such as:
      sitting cross-legged reading a book,
      standing in wind with eyes closed,
      looking out a window in thought,
      writing in a journal,
      walking alone in evening light,
      arms stretched wide in release,
      sitting on steps with a cup,
      dancing alone in a room,
      lying in grass looking upward,
      standing in rain with eyes open,
      leaning against a balcony rail at dusk,
      or sitting on the floor beside a softly lit bed.
      The pose should feel emotionally readable at a glance.

      The girl should be stylized but expressive:
      graceful silhouette,
      clear posture,
      simple modern features,
      soft but confident body language,
      and a sense of lived emotion rather than fashion posing.
      She should feel relatable, feminine, contemporary, and visually elegant.

      Use a flat vector style with clean shapes, crisp edges, minimal texture, and strong graphic clarity.
      Keep the illustration modern and premium — not childish, not overly cartoonish, not overly corporate.
      It should feel like an editorial social post or a beautifully art-directed lifestyle illustration.

      The visual hook must come from bold color contrast.
      Use a 4 to 5 color palette only, with one strong complementary or near-complementary pairing
      that creates immediate visual pull. Examples include:
      electric teal outfit against warm peach,
      cobalt jacket against vivid mustard,
      burgundy against sage,
      coral against deep turquoise,
      golden yellow against muted violet,
      or rust red against blue-green.
      Let one color dominate and the contrasting color support, so the palette feels punchy but controlled.
      Use contrast to make the subject stand out instantly without becoming chaotic. Complementary color pairings
      are preferred because they create high contrast and strong visual engagement.

      Clothing should feel modern and emotionally appropriate:
      soft knits, oversized shirts, simple dresses, relaxed trousers, scarves, jackets, casual homewear,
      or light traditional attire only when culturally resonant and relevant to the quote.
      Avoid overly trendy fashion styling that steals attention from the emotion.

      Build a strong visual focal point through the pose and one color-led area:
      a bright coat in wind,
      a vivid book against a muted scene,
      glowing socks on a windowsill,
      a bold umbrella in rain,
      a contrasting chair,
      a journal on the lap,
      or a scarf creating shape and movement.
      The first thing the eye lands on should feel emotionally connected to the quote.

      Composition must protect quote space.
      Place the girl and any main environmental elements in the upper third, one side of the frame,
      or a compact upper-center composition.
      Keep the lower two-thirds, or a large central-lower region, open and visually calm for the quote.
      Use clean background color fields, simple interior walls, window light, sky gradients, floor planes,
      or empty room space as elegant negative space.
      No clutter, no busy props, and no complex scenery should interfere with text readability.

      Add a touch of life through small supporting details:
      curtain movement,
      a loose page corner,
      wind through hair,
      rain lines on glass,
      long evening shadows,
      grass bending,
      steam rising from a cup,
      or fabric stretching with the pose.
      These details should create emotional atmosphere without crowding the composition.

      The emotional tone should feel human and save-worthy:
      tender, reflective, quietly lonely, hopeful, peaceful, romantic, or softly empowered.
      The image should feel like a moment someone recognizes from their own life.

      NO photorealism, NO gradient-heavy 3D shading, NO crowded rooms, NO too many props,
      NO more than 5 main colors, NO muddy palette, NO childish cartoon proportions,
      NO fashion-ad glamour posing, NO visual noise in the quote area.

      The final image should feel like a premium contemporary quote illustration:
      bold, warm, clean, relatable, and spacious enough for the words to land beautifully.

    categories: [love, goodnight]
    weight: high

  vector_couple:
    description: >
      A clean flat 2D vector illustration of two figures, designed to feel emotionally immediate,
      visually polished, and instantly legible even at thumbnail size. The image should create a
      strong scroll-stopping hook through relational body language, warm-vs-cool color contrast,
      and a composition that leaves elegant negative space for the quote.
  
      Choose a moment that matches the quote’s emotion, such as:
      leaning toward each other without quite touching,
      walking side by side in silence,
      one resting their head on the other’s shoulder,
      sitting back to back reading,
      sharing an umbrella,
      one reaching toward the other across a small gap,
      sitting on a bench watching something together,
      slow dancing in a small room,
      one figure walking away while the other watches,
      standing at a window side by side,
      sitting on steps with knees nearly touching,
      or lying beneath the same night sky with space between them.
      The pose should communicate the feeling instantly, even before the quote is read.
  
      The figures should be stylized but expressive:
      clear silhouettes,
      graceful posture,
      emotionally readable spacing,
      natural hand placement,
      and strong body language that suggests tenderness, distance, comfort, longing, or quiet connection.
      Keep facial features minimal if needed — the emotion should come mostly from shape, pose, and distance.
  
      Use a flat vector style with crisp edges, clean shapes, minimal texture, and high graphic clarity.
      The image should feel modern and premium — not childish, not overly cartoonish, and not like a generic stock couple graphic.
      It should look like an art-directed editorial social post.
  
      The main visual hook must come from warm-vs-cool contrast.
      Render the figures in warm tones such as terracotta, blush, amber, muted coral, cinnamon, or soft rose,
      and place them against a cool high-contrast backdrop such as deep teal, indigo, slate, storm blue, or muted night green.
      Alternatively, place warm-lit figures inside a cool dark room or evening setting.
      The warm figures should feel emotionally alive against the cooler environment.
      This color separation should create instant depth, clarity, and scroll-stopping impact.
  
      Use a restrained 4 to 5 color palette only.
      Let one warm tone dominate the figures, one cool tone dominate the background,
      and use one supporting neutral or soft highlight color to keep the image balanced.
      Avoid muddy palettes or too many equal-intensity colors.
  
      Build the focal point around the emotional gap or connection between the figures:
      almost-touching hands,
      shoulder contact,
      shared gaze direction,
      the small space between bodies,
      one leaning in while the other remains still,
      or a warm light source falling across both of them.
      The eye should land first on the relationship between them.
  
      Composition must protect quote space.
      Place the couple in the upper third, upper corner, or one side of the frame.
      Keep the lower two-thirds, or a large central-lower region, open and visually calm for the quote.
      Use clean wall space, soft sky gradients, simple night backgrounds, window light, empty floor planes,
      or quiet abstract environment shapes as negative space.
      No busy furniture, no crowded scenery, and no detail-heavy backgrounds should interfere with readability.
  
      Add a few subtle supporting details if they strengthen the emotion:
      a curtain moving,
      rain outside the window,
      one lamp glow,
      a bench shadow,
      a shared umbrella shape,
      drifting leaves,
      a moon outside,
      or the edge of a room fading into calm color.
      These elements should support the mood without stealing focus from the figures.
  
      The final mood should feel intimate, romantic, bittersweet, comforting, or quietly heartbreaking,
      depending on the quote. It should feel like a moment people recognize emotionally from their own lives.
  
      NO photorealism, NO crowd scenes, NO complex backgrounds, NO exaggerated cartoon proportions,
      NO more than 5 main colors, NO clutter in the quote area, NO fashion-catalog posing,
      NO over-rendered facial detail, NO noisy patterns.
  
