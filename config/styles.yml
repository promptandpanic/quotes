    weight: low

  paper_cut_shadowbox:
    description: >
      A layered paper-cut shadowbox illustration designed to feel handcrafted, atmospheric,
      and instantly mesmerizing. The image should look like an intricate cut-paper scene built
      from stacked layers of paper, where depth, shadow, and light create the emotional hook.
      It should feel premium, tactile, and almost magical — like a framed illuminated paper artwork
      someone would stop scrolling to admire.

      Build the image from multiple precisely cut paper layers with visible depth separation between them.
      Each layer should feel intentional and cleanly shaped, creating a sense of dimensional storytelling
      through overlapping silhouettes, soft cast shadows, and glowing depth. The scene should feel delicate,
      immersive, and beautifully composed rather than busy or craft-like.

      Choose a poetic, readable scene that matches the quote’s emotion, such as:
      a lone tree on a hill beneath a moon,
      layered forest silhouettes with a glowing path,
      a window glowing through paper-cut walls,
      birds flying across a twilight sky,
      a small boat on still layered water,
      a staircase rising toward a circle of light,
      a figure beneath hanging stars,
      reeds and moon reflected in water,
      a paper moon above layered clouds,
      a tiny house with warm light in a dark valley,
      a bench beneath branches,
      or a doorway framed by layered leaves and shadow.

      The main visual hook must come from depth and light.
      The layers should create a strong sense of foreground, midground, and background,
      with soft realistic shadows falling from one paper layer onto the next.
      Use one hidden or diffused light source to create glow within the scene:
      moonlight through cut layers,
      a warm light in a window,
      a circular opening of light,
      a glowing horizon,
      or a softly illuminated sky behind the paper forms.
      The viewer should immediately feel depth, stillness, and wonder.

      The color palette should remain restrained and elegant.
      Use layered tones such as ivory, warm cream, charcoal, muted indigo, dusty blue, soft sage,
      pale grey, or deep night blue.
      If a warm accent is needed, use it sparingly in one focal area only:
      window light, moon glow, lantern glow, or horizon warmth.
      Avoid rainbow palettes or bright decorative craft colors.
      The style should feel gallery-worthy and sophisticated.

      Composition must protect quote space.
      Keep the main layered paper scene concentrated in the upper third, one side of the frame,
      or a contained central-top composition.
      Preserve a large calm area of softly lit background, open sky layer, empty paper field,
      or low-detail lower section for the quote.
      The lower two-thirds, or at minimum a broad central-lower block, should remain smooth and quiet
      enough for text overlay without breaking the illusion of the paper artwork.

      Use negative space as part of the shadowbox effect.
      The empty areas should feel like breathing room inside the composition,
      making the paper layers feel more dramatic and the quote more elegant.
      The design should never feel crowded with too many cut elements.

      Prioritize strong silhouette shapes in every layer:
      clean tree lines,
      graceful branches,
      smooth hills,
      elegant moon arcs,
      still water contours,
      soft cloud bands,
      or architectural openings.
      Each layer should read clearly on its own while contributing to the whole scene.

      Add subtle emotional storytelling through depth and spacing:
      a tiny figure in the distance,
      one path leading inward,
      one bird suspended in open space,
      a single lit window among dark layers,
      or a staircase disappearing toward light.
      The scene should feel contemplative, symbolic, and softly cinematic.

      NO messy handmade scraps, NO rough collage look, NO excessive decoration,
      NO bright children's craft colors, NO too many tiny cut details, NO cluttered quote area,
      NO flat single-layer look, NO photorealism, NO harsh textures that overpower the design.

      The final image should feel like an illuminated paper poem:
      layered, quiet, dimensional, emotionally rich, and spacious enough for the quote to land beautifully.

    categories: [mindfulness, wisdom, goodnight, latenight]
    weight: high

  editorial_collage:
    description: >
      A premium editorial collage illustration designed to feel intelligent, emotionally layered,
      and instantly distinctive. The image should look like a refined mixed-media magazine artwork —
      combining cut paper, photographic fragments, painted textures, typography remnants, ink marks,
      and carefully arranged visual elements into one cohesive emotional statement. It should feel
      art-directed, story-rich, and sophisticated enough to stop the scroll through curiosity alone.

      Build the image as a conceptual collage with one clear emotional idea at its center.
      The scene or composition should not feel random or scrapbook-like.
      Every element must contribute to one unified feeling, tension, or insight.
      The collage should feel editorial — like it belongs in a thoughtful literary magazine,
      cultural journal, or design-forward print feature.

      Choose a scene or symbolic arrangement that matches the quote’s meaning, such as:
      a woman’s silhouette filled with sky and torn paper textures,
      a figure seated in a room made of layered cut pages,
      two hands nearly touching across ripped color fields,
      a face partially obscured by flowers, letters, or shadows,
      a moon over a staircase made of torn newspaper strips,
      a window cut into a field of painted darkness,
      a person walking through overlapping fragments of maps, clouds, and old paper,
      a chair, lamp, and empty coat arranged like memory,
      or a figure whose shadow is made of collage fragments instead of darkness.
      The final image should feel symbolic and emotionally readable, not literally descriptive.

      Use a mixed-media editorial visual language:
      torn paper edges,
      cut photographic fragments,
      vintage paper textures,
      painted brushstrokes,
      ink marks,
      soft grain,
      layered shapes,
      selective typography fragments,
      and occasional hand-drawn details.
      These materials should feel curated and refined, never messy or overloaded.

      The main hook must come from conceptual layering and contrast.
      Create one striking visual relationship that makes the viewer pause:
      face versus shadow,
      body versus sky,
      memory versus room,
      softness versus torn edges,
      light versus paper darkness,
      or stillness versus fragmented texture.
      The image should feel like it reveals meaning in layers rather than all at once.

      Keep the palette disciplined and editorial.
      Use muted, sophisticated tones such as charcoal, cream, faded navy, dusty blush,
      muted rust, sepia, pale sage, soft black, paper white, or washed indigo.
      If a stronger accent is needed, use one selectively:
      crimson, cobalt, ochre, deep coral, or antique gold.
      Avoid loud rainbow collage or chaotic magazine-color overload.
      It should feel premium, not crafty.

      Composition must protect quote space.
      Keep the primary collage cluster in the upper third, upper side, or a contained compositional block.
      Preserve a large calm area of paper background, soft painted field, muted texture wash,
      or low-detail collage space where the quote can sit clearly.
      The lower two-thirds, or a broad central-lower area, should remain breathable and visually controlled.

      Use negative space intentionally as part of the editorial design.
      Blank paper, quiet painted areas, and controlled low-detail surfaces should give the composition
      sophistication and allow the quote to breathe.
      The image should feel curated and spacious, not dense from edge to edge.

      Let texture support emotion without overpowering clarity.
      Torn edges can suggest fracture,
      layered paper can suggest memory,
      obscured faces can suggest distance,
      type fragments can suggest inner thoughts,
      and paint marks can suggest movement or feeling.
      But the collage should still read clearly in one glance and deepen on a second look.

      The emotional tone should feel introspective, stylish, slightly melancholic, and intellectually engaging.
      It should work for themes like longing, identity, hidden emotion, memory, overthinking, emotional distance,
      late-night reflection, or quiet realization.
      The result should feel more like visual essay art than social-media filler.

      NO random scrapbook clutter, NO too many tiny objects, NO childish cut-and-paste feel,
      NO bright craft-store palette, NO dense full-frame noise, NO overly vintage sepia wash over everything,
      NO photorealistic montage, NO decorative chaos in the quote area.

      The final image should feel like a page from a beautifully designed emotional magazine:
      layered, meaningful, textural, intelligent, and spacious enough for the quote to land with depth.

    categories: [wisdom, latenight, love, mindfulness]
    weight: high

  flip_reveal_poster:
    description: >
      A visually arresting poster-style illustration built around a dual-state reveal:
      one image, two emotional readings. The artwork should feel like a static design that hints at motion,
      change, or hidden truth — as if the image could flip, shift, or reveal something different if seen from
      another angle. The result should be instantly intriguing, conceptually sharp, and powerful enough to stop
      the scroll through curiosity alone.

      Build the composition around one clear visual contrast between outer reality and inner truth,
      before and after, presence and absence, calm and ache, or what is shown versus what is felt.
      The two states should coexist elegantly within one frame.
      The viewer should understand the basic image immediately, then notice a second layer of meaning
      a moment later.

      Choose a scene or subject with dual emotional logic, such as:
      a seated figure whose reflection is already walking away,
      a calm room whose shadow reveals emotional collapse,
      a woman standing at a window while her silhouette faces the opposite direction,
      a tree in winter whose reflection appears in bloom,
      a staircase rising upward while its shadow descends,
      a door standing closed while light beneath it forms an open path,
      two people sitting together while their shadows drift apart,
      a face divided between light and darkness with different emotional expressions,
      a moonlit lake reflecting a different sky than the one above,
      or a figure whose body remains still while paper fragments of them move away.
      The contrast should feel poetic, not gimmicky.

      The main hook must come from the reveal structure.
      Use one of these visual devices:
      reflection mismatch,
      shadow contradiction,
      split composition,
      double exposure logic,
      mirrored emotional contrast,
      layered silhouette reveal,
      or hidden secondary image embedded within the main form.
      The reveal should feel intelligent and emotionally meaningful, not like a cheap trick.

      The style should feel like a premium conceptual poster:
      clean composition,
      strong visual hierarchy,
      graphic clarity,
      emotionally charged symbolism,
      and enough realism or painterly depth to make the scene feel immersive.
      It can be illustrated, painterly, or mixed-media inspired,
      but must remain visually elegant and clearly readable.

      Keep the palette controlled and cinematic.
      Use two emotional tonal worlds in one frame:
      for example warm amber versus cool indigo,
      pale cream versus charcoal,
      muted dusk blue versus soft rust,
      or moonlit silver versus deep shadow.
      Color should help define the two emotional states.
      One side or layer may feel warm and human,
      while the other feels distant, hidden, broken, or remembered.

      Composition must preserve quote space.
      Keep the main reveal structure concentrated in the upper third, upper half, or one side of the frame.
      Preserve a large clean area of background, shadow field, sky, wall, water, or empty poster space
      for the quote. The lower two-thirds, or at minimum a broad central-lower region, should remain visually calm
      enough for text overlay without disrupting the reveal effect.

      Use negative space deliberately.
      Empty space should heighten the reveal by making the main contradiction easier to notice.
      Blank areas, dark atmosphere, open sky, still water, or soft wall surfaces should give the image
      elegance, clarity, and breathing room.
      The design should feel intentional and poster-like, not crowded with clues.

      Add subtle supporting details only when they strengthen the dual reading:
      a reflection line,
      a sharp beam of light,
      one dividing shadow,
      paper fragments drifting,
      a mirrored doorway,
      one cracked edge,
      or a slight misalignment between two visual states.
      These details should deepen the concept without overwhelming it.

      The emotional tone should feel intimate, thought-provoking, and quietly devastating or illuminating.
      It should work especially well for themes like hidden hurt, emotional distance, clarity after confusion,
      internal versus external self, memory, detachment, grief, or realization.
      The image should feel like it knows something the viewer also knows but has not said out loud.

      NO chaotic surreal overload, NO multiple unrelated reveal tricks, NO cluttered backgrounds,
      NO visual confusion that hides the concept, NO gimmicky glitch effects, NO neon overload,
      NO decorative complexity in the quote area.

      The final image should feel like a beautiful emotional contradiction:
      one frame, two truths, and a reveal that makes the quote land harder on the second look.

    categories: [latenight, wisdom, love, mindfulness]
    weight: high

