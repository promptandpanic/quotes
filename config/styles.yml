  risograph_print:
    description: >
      A bold duotone risograph-style print with a clearly composed, emotionally readable scene and
      a tactile hand-printed feel. The image should feel like an artful editorial poster pulled from
      an indie print studio — graphic, nostalgic, slightly imperfect, and instantly eye-catching in the feed.

      Choose a specific, legible subject that matches the quote’s mood, such as:
      a figure on a rooftop watching the city,
      two people walking under a large moon,
      a person cycling past illuminated shop fronts,
      someone reading beneath a large window,
      a forest path with dappled light,
      a coastal cliff at dusk,
      a couple on a bench by water,
      a lit stairwell between buildings,
      a small café front at night,
      a lone figure beneath telephone wires,
      or a quiet road curving toward a distant glow.
      The scene must be specific and recognizable at a glance — never vague shapes or abstract atmosphere only.

      Render the entire image using only two overlapping risograph inks.
      The palette should feel bold, graphic, and unmistakably printed.
      Strong combinations include:
      indigo + warm cream,
      deep teal + vivid coral,
      dark navy + acid yellow,
      forest green + peach,
      plum + pale orange,
      or charcoal blue + soft pink.
      The two inks should create immediate contrast and a memorable poster-like identity.

      The main visual hook must come from graphic duotone separation and print character.
      Use flat or lightly tonal ink areas, visible halftone grain, soft paper influence,
      and slight misregistration between the two ink layers.
      The misregistration should feel charming, tactile, and handmade —
      just enough to create warmth and authenticity, never enough to blur the scene or reduce legibility.

      Prioritize clarity over texture.
      The subject, silhouettes, windows, moon, bench, bicycle, path, or rooftop edge must remain clearly readable.
      Grain and overlap should add personality, but the composition must still read in under a second.

      Use composition to create both hook and quote space.
      Keep the main scene compact and strongly framed in the upper third, upper side, or one contained area.
      Preserve a large calm region of paper tone, sky, water, wall, or softly halftoned background
      for the quote. The lower two-thirds, or a broad central-lower block, should remain visually quiet
      enough for text overlay, with no busy cluster of halftone detail or dense scene elements.

      Use negative space intentionally.
      In this style, negative space may be paper-colored emptiness, flat ink background, calm sky,
      still water, or a lightly textured wall of halftone.
      It should create breathing room, improve readability, and make the composition feel like a real poster
      rather than a crowded print.

      Build a strong focal structure:
      one moon,
      one lit window,
      one rooftop figure,
      one bicycle rider,
      one bench scene,
      or one path leading inward.
      Let the eye land immediately on the clearest narrative element, then notice the print texture second.

      The emotional tone should feel thoughtful, intimate, slightly nostalgic, and artistically grounded.
      It should work especially well for wisdom, late-night thought, and mindful reflection —
      something that feels handmade, save-worthy, and visually different from glossy digital styles.

      Keep the risograph aesthetic authentic:
      slight ink overlap,
      visible grain,
      occasional imperfect edges,
      subtle registration shift,
      and the sense that the paper itself matters.
      But never let the effect become so rough that the scene loses elegance.

      NO more than two inks, NO rainbow palette, NO photorealism, NO glossy gradients,
      NO excessive misregistration, NO muddy overlap, NO vague unreadable forms,
      NO heavy texture over the quote area, NO cluttered scene composition.

      The final image should feel like a collectible printed poster:
      bold, tactile, graphic, emotionally clear, and spacious enough for the quote to land beautifully.

